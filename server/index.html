<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizZap – Live Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & VARS ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #060611;
      --surface: #0d0d22;
      --border:  rgba(255,255,255,0.08);
      --pink:    #FF3366;
      --cyan:    #00D4FF;
      --gold:    #FFD700;
      --green:   #39FF14;
      --text:    #eef0ff;
      --muted:   rgba(238,240,255,0.45);
      --fd: 'Russo One', sans-serif;
      --fm: 'Space Mono', monospace;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--fm); min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,212,255,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 105%, rgba(255,51,102,.06) 0%, transparent 55%);
    }
    /* scanlines overlay */
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.025) 2px, rgba(0,0,0,.025) 4px);
    }

    /* ── LAYOUT ────────────────────────────────────────────────── */
    #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
    #hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      background: rgba(6,6,17,.85); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100; min-height: 60px;
    }
    #main { flex: 1; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
    .container-sm { max-width: 560px; margin: 0 auto; padding: 32px 20px; }

    /* ── LOGO ──────────────────────────────────────────────────── */
    .logo { font-family: var(--fd); font-size: 1.4rem; letter-spacing: .06em; color: var(--cyan); text-shadow: 0 0 20px rgba(0,212,255,.5); user-select: none; }
    .logo span { color: var(--pink); text-shadow: 0 0 20px rgba(255,51,102,.5); }

    /* ── BUTTONS ───────────────────────────────────────────────── */
    .btn { font-family: var(--fm); font-size: .78rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 10px 22px; border: none; border-radius: 5px; cursor: pointer; transition: all .18s; outline: none; }
    .btn:active { transform: scale(.97) !important; }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .btn-cyan  { background: var(--cyan);  color: #060611; box-shadow: 0 0 18px rgba(0,212,255,.35); }
    .btn-cyan:hover  { box-shadow: 0 0 30px rgba(0,212,255,.65); transform: translateY(-1px); }
    .btn-pink  { background: var(--pink);  color: #fff; box-shadow: 0 0 18px rgba(255,51,102,.35); }
    .btn-pink:hover  { box-shadow: 0 0 30px rgba(255,51,102,.65); transform: translateY(-1px); }
    .btn-gold  { background: var(--gold);  color: #060611; box-shadow: 0 0 18px rgba(255,215,0,.35); }
    .btn-gold:hover  { box-shadow: 0 0 30px rgba(255,215,0,.65); transform: translateY(-1px); }
    .btn-green { background: var(--green); color: #060611; box-shadow: 0 0 18px rgba(57,255,20,.35); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
    .btn-sm { padding: 7px 15px; font-size: .7rem; }
    .btn-lg { padding: 14px 32px; font-size: .9rem; }
    .btn-full { width: 100%; }

    /* ── INPUTS ────────────────────────────────────────────────── */
    .input {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px; color: var(--text); font-family: var(--fm);
      font-size: .85rem; transition: border-color .2s, box-shadow .2s; outline: none;
    }
    .input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,212,255,.1); }
    .input::placeholder { color: var(--muted); }
    .input-sm { padding: 7px 10px; font-size: .78rem; }
    label.lbl { display: block; font-size: .67rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }

    /* ── CARDS ─────────────────────────────────────────────────── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    .card-glow { box-shadow: 0 0 40px rgba(0,212,255,.05), inset 0 1px 0 rgba(255,255,255,.04); }

    /* ── BADGES ────────────────────────────────────────────────── */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 11px; border-radius: 20px; font-size: .67rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }
    .badge-pink  { background: rgba(255,51,102,.15); color: var(--pink); border: 1px solid rgba(255,51,102,.3); }
    .badge-cyan  { background: rgba(0,212,255,.15);  color: var(--cyan); border: 1px solid rgba(0,212,255,.3); }
    .badge-green { background: rgba(57,255,20,.12);  color: var(--green); border: 1px solid rgba(57,255,20,.3); }
    .badge-gold  { background: rgba(255,215,0,.12);  color: var(--gold); border: 1px solid rgba(255,215,0,.3); }

    /* ── LIVE DOT ───────────────────────────────────────────────── */
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.2s ease-in-out infinite; display: inline-block; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

    /* ── TABS ───────────────────────────────────────────────────── */
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .tab { font-family: var(--fm); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; padding: 10px 18px; cursor: pointer; color: var(--muted); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

    /* ── LANDING ────────────────────────────────────────────────── */
    .landing { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 60px); padding: 40px 20px; gap: 18px; text-align: center; }
    .landing h1 { font-family: var(--fd); font-size: clamp(2.2rem,6vw,4.5rem); line-height: 1.08; letter-spacing: .03em; }
    .landing h1 .c1 { color: var(--pink); text-shadow: 0 0 30px rgba(255,51,102,.5); }
    .landing h1 .c2 { color: var(--cyan); text-shadow: 0 0 30px rgba(0,212,255,.5); }
    .landing-sub { color: var(--muted); font-size: .88rem; max-width: 400px; line-height: 1.75; }
    .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 520px; margin-top: 10px; }
    .role-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 30px 22px; cursor: pointer; transition: all .25s; }
    .role-card:hover { transform: translateY(-4px); }
    .role-card.rhost:hover { border-color: var(--pink); box-shadow: 0 8px 40px rgba(255,51,102,.15); }
    .role-card.rjoin:hover { border-color: var(--cyan); box-shadow: 0 8px 40px rgba(0,212,255,.15); }
    .role-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .role-title { font-family: var(--fd); font-size: 1.05rem; margin-bottom: 6px; }
    .role-desc { font-size: .7rem; color: var(--muted); line-height: 1.6; }

    /* ── HOST BUILD ─────────────────────────────────────────────── */
    .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; position: relative; margin-bottom: 14px; transition: border-color .2s; }
    .q-card:hover { border-color: rgba(255,255,255,.14); }
    .q-num { position: absolute; top: -10px; left: 16px; background: var(--cyan); color: #060611; font-size: .62rem; font-weight: 700; letter-spacing: .1em; padding: 2px 10px; border-radius: 20px; }
    .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .opt-row { display: flex; align-items: center; gap: 8px; }
    .opt-badge { width: 26px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700; color: #060611; flex-shrink: 0; }
    .correct-radio { cursor: pointer; accent-color: var(--green); transform: scale(1.25); flex-shrink: 0; }
    .q-footer { display: flex; align-items: center; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
    .build-actions { display: flex; gap: 10px; margin-top: 6px; padding-top: 18px; border-top: 1px solid var(--border); }

    /* ── HOST LIVE ──────────────────────────────────────────────── */
    .live-bar { background: linear-gradient(90deg, rgba(255,51,102,.12), rgba(0,212,255,.12)); border: 1px solid rgba(0,212,255,.25); border-radius: 10px; padding: 16px 22px; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
    .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 8px; padding: 11px 18px; flex: 1; min-width: 90px; }
    .stat-val { font-family: var(--fd); font-size: 1.5rem; }
    .stat-lbl { font-size: .62rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }
    .ans-bar-wrap { margin: 6px 0; }
    .ans-bar-label { display: flex; justify-content: space-between; font-size: .7rem; color: var(--muted); margin-bottom: 3px; }
    .ans-bar { height: 7px; border-radius: 4px; transition: width .5s ease; min-width: 0; }
    .section-lbl { font-size: .67rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 20px; padding: 5px 13px; font-size: .73rem; display: flex; align-items: center; gap: 6px; }

    /* ── PROGRESS BAR ───────────────────────────────────────────── */
    .progress { height: 4px; background: rgba(255,255,255,.07); border-radius: 2px; overflow: hidden; margin-bottom: 22px; }
    .progress-fill { height: 100%; background: var(--cyan); border-radius: 2px; transition: width 1s linear; }

    /* ── TIMER SVG ──────────────────────────────────────────────── */
    .timer-wrap { width: 70px; height: 70px; position: relative; display: flex; align-items: center; justify-content: center; }
    .timer-svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
    #timer-label { font-family: var(--fd); font-size: 1.3rem; position: relative; z-index: 1; }

    /* ── QUESTION VIEW ──────────────────────────────────────────── */
    .q-text { font-family: var(--fd); font-size: clamp(1.1rem,2.5vw,1.5rem); line-height: 1.4; margin-bottom: 24px; }
    .q-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .q-opt { border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; font-size: .84rem; border: 2px solid transparent; cursor: pointer; transition: all .2s; font-family: var(--fm); }
    .q-opt:hover { filter: brightness(1.18); transform: translateY(-2px); }
    .q-opt.selected { filter: brightness(1.2); transform: scale(1.02); }
    .q-opt.correct-opt { border-color: var(--green) !important; box-shadow: 0 0 20px rgba(57,255,20,.3); }
    .q-opt.wrong-opt { opacity: .45; filter: grayscale(.5); }
    .q-opt.no-hover:hover { filter: none; transform: none; cursor: default; }
    .opt-lbl { width: 26px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .75rem; color: #060611; flex-shrink: 0; }
    .result-card { border-radius: 10px; padding: 22px; text-align: center; margin-top: 16px; }
    .result-card .big { font-family: var(--fd); font-size: 1.3rem; margin-top: 6px; }
    .result-hint { color: var(--muted); font-size: .75rem; margin-top: 8px; }

    /* ── WAITING ────────────────────────────────────────────────── */
    .wait-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 60px); padding: 40px 20px; text-align: center; gap: 14px; }
    .wait-title { font-family: var(--fd); font-size: clamp(1.6rem,4vw,2.4rem); }
    .wait-sub { color: var(--muted); font-size: .86rem; }
    .join-box { width: 100%; max-width: 360px; }
    .join-box .input { text-align: center; font-size: 1.05rem; padding: 14px; margin-bottom: 12px; }

    /* ── LEADERBOARD ────────────────────────────────────────────── */
    .lb { display: grid; gap: 8px; }
    .lb-row { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
    .lb-rank { font-family: var(--fd); font-size: .95rem; min-width: 26px; text-align: center; }
    .lb-name { flex: 1; font-size: .84rem; }
    .lb-score { font-family: var(--fd); color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,.4); font-size: 1.05rem; }
    .lb-row.me { border-color: rgba(0,212,255,.4); background: rgba(0,212,255,.05); }
    .lb-row:nth-child(1) { border-color: rgba(255,215,0,.35); background: rgba(255,215,0,.05); }
    .lb-row:nth-child(2) { border-color: rgba(200,200,200,.25); }
    .lb-row:nth-child(3) { border-color: rgba(205,127,50,.25); }

    /* ── UTILS ──────────────────────────────────────────────────── */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .mt-1 { margin-top: 6px; }
    .mt-2 { margin-top: 12px; }
    .mt-3 { margin-top: 18px; }
    .mt-4 { margin-top: 24px; }
    .mb-2 { margin-bottom: 12px; }
    .mb-3 { margin-bottom: 18px; }
    .mb-4 { margin-bottom: 24px; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: .78rem; }
    .text-center { text-align: center; }

    /* ── RESPONSIVE ─────────────────────────────────────────────── */
    @media (max-width: 580px) {
      .q-opts, .opts-grid, .role-grid { grid-template-columns: 1fr; }
      .container, .container-sm { padding: 20px 14px; }
    }

    /* ── CONNECTION TOAST ───────────────────────────────────────── */
    #conn-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,51,102,.9); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: .78rem; letter-spacing: .06em; display: none; z-index: 9999; backdrop-filter: blur(8px); }
    #conn-toast.show { display: block; }
  </style>
</head>
<body>

<div id="app">
  <header id="hdr"></header>
  <main id="main"></main>
</div>

<div id="conn-toast">⚡ Reconnecting…</div>

<script>
/* ═══════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════ */
const COLORS = ['#FF3366','#00D4FF','#FFD700','#39FF14'];
const LABELS = ['A','B','C','D'];
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;

/* ═══════════════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════════════ */
let S = {};                   // server state
let myRole = null;            // 'host' | 'participant'
let myPid  = null;
let myName = null;
let hostTab = 'build';        // 'build' | 'live' | 'scores'
let prevStatus = null;
let prevQIndex = -1;

// Host-only draft (never synced to server until start)
let draft = { questions: [mkQ()] };

function mkQ() {
  return { _id: Math.random().toString(36).slice(2), text: '', options: ['','','',''], correct: 0, timeLimit: 20 };
}

/* ═══════════════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════════════ */
let timerTick = null;

function startTimer(total, startedAt) {
  clearInterval(timerTick);
  function tick() {
    const elapsed = (Date.now() - startedAt) / 1000;
    const left = Math.max(0, Math.round(total - elapsed));
    const circle = document.getElementById('timer-circle');
    const label  = document.getElementById('timer-label');
    if (!circle || !label) return;
    const r = 29, circ = 2 * Math.PI * r;
    const pct = left / total;
    const clr = pct > .5 ? '#00D4FF' : pct > .25 ? '#FFD700' : '#FF3366';
    circle.style.strokeDashoffset = circ * (1 - pct);
    circle.style.stroke = clr;
    label.textContent = left;
    label.style.color = clr;
  }
  tick();
  timerTick = setInterval(tick, 400);
}

function stopTimer() {
  clearInterval(timerTick);
  timerTick = null;
}

/* ═══════════════════════════════════════════════════════
   WEBSOCKET
═══════════════════════════════════════════════════════ */
let ws;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('conn-toast').classList.remove('show');
    if (myRole === 'host')        ws_send({ type: 'set_host' });
    else if (myRole === 'participant' && myName)
      ws_send({ type: 'join', name: myName, pid: myPid });
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state')  handleState(msg.data);
    if (msg.type === 'joined') { myPid = msg.pid; sessionStorage.setItem('pid', msg.pid); }
  };

  ws.onclose = () => {
    document.getElementById('conn-toast').classList.add('show');
    setTimeout(connect, 2200);
  };
  ws.onerror = () => ws.close();
}

function ws_send(data) {
  if (ws?.readyState === 1) ws.send(JSON.stringify(data));
}

/* ═══════════════════════════════════════════════════════
   STATE HANDLER
═══════════════════════════════════════════════════════ */
function handleState(s) {
  const statusChanged = s.status !== prevStatus;
  const qChanged      = s.qIndex !== prevQIndex;

  S = s;

  if (s.status === 'active' && s.currentQuestion && (statusChanged || qChanged))
    startTimer(s.currentQuestion.timeLimit, s.questionStartedAt);
  if (s.status !== 'active') stopTimer();

  render();
  prevStatus = s.status;
  prevQIndex = s.qIndex ?? -1;
}

/* ═══════════════════════════════════════════════════════
   RENDER ROUTER
═══════════════════════════════════════════════════════ */
function render() {
  renderHeader();
  if (!myRole)              renderMain(landingHTML());
  else if (myRole === 'host') renderHostView();
  else                      renderParticipantView();
}

function renderMain(html) {
  document.getElementById('main').innerHTML = html;
  bindEvents();
}

function renderHeader() {
  const hdr = document.getElementById('hdr');
  let right = '';
  if (myRole === 'host') right = '<span class="badge badge-pink">🎛️ HOST</span>';
  else if (myRole === 'participant' && myName) right = `<span class="badge badge-cyan">👤 ${esc(myName)}<\/span>`;

  const isLive = myRole === 'host' && S.status === 'active';
  const liveBadge = isLive ? '<span class="badge badge-green"><span class="dot"><\/span> LIVE<\/span>' : '';

  hdr.innerHTML = `
    <div class="logo">QUIZ<span>ZAP<\/span><\/div>
    <div class="flex gap-3 items-center">${liveBadge}${right}<\/div>
  `;
}

/* ═══════════════════════════════════════════════════════
   LANDING
═══════════════════════════════════════════════════════ */
function landingHTML() {
  return `
  <div class="landing">
    <span class="badge badge-cyan">⚡ Real-time Quiz Platform<\/span>
    <h1>Run a <span class="c1">Live<\/span><br>Quiz in <span class="c2">Seconds<\/span><\/h1>
    <p class="landing-sub">Build questions, launch instantly, and watch your audience answer in real-time — no accounts needed.<\/p>
    <div class="role-grid">
      <div class="role-card rhost" id="btn-host">
        <div class="role-icon">🎛️<\/div>
        <div class="role-title">Host<\/div>
        <div class="role-desc">Build questions, control the quiz, and see live results<\/div>
      <\/div>
      <div class="role-card rjoin" id="btn-join">
        <div class="role-icon">🎮<\/div>
        <div class="role-title">Join<\/div>
        <div class="role-desc">Enter your name and answer questions as they appear<\/div>
      <\/div>
    <\/div>
    <p class="text-sm text-muted mt-2">💡 Share this URL with participants — they click Join!</p>
  <\/div>`;
}

/* ═══════════════════════════════════════════════════════
   HOST VIEW
═══════════════════════════════════════════════════════ */
function renderHostView() {
  // Don't re-render build tab while user is editing (preserves focus)
  if (hostTab === 'build' && document.getElementById('questions-wrap')) {
    return; // already rendered
  }
  const main = document.getElementById('main');
  main.innerHTML = hostWrapHTML();
  bindHostEvents();
}

function hostWrapHTML() {
  const tabs = ['build','live','scores'].map(t => `
    <button class="tab ${hostTab===t?'active':''}" data-tab="${t}">
      ${{build:'📝 Build',live:'⚡ Live',scores:'🏆 Scores'}[t]}
    <\/button>`).join('');

  let body = '';
  if (hostTab === 'build')  body = buildTabHTML();
  if (hostTab === 'live')   body = liveTabHTML();
  if (hostTab === 'scores') body = scoresTabHTML();

  return `<div class="container"><div class="tabs">${tabs}<\/div>${body}<\/div>`;
}

/* ── Build Tab ── */
function buildTabHTML() {
  const qs = draft.questions.map((q, qi) => `
    <div class="q-card">
      <div class="q-num">Q${qi+1}<\/div>
      <div class="mb-2 mt-2">
        <label class="lbl">Question<\/label>
        <input class="input" data-qi="${qi}" data-field="text" value="${esc(q.text)}" placeholder="Enter your question…" />
      <\/div>
      <div class="opts-grid" id="questions-wrap">
        ${q.options.map((o, oi) => `
          <div class="opt-row">
            <div class="opt-badge" style="background:${COLORS[oi]}">${LABELS[oi]}<\/div>
            <input class="input input-sm" data-qi="${qi}" data-field="option" data-oi="${oi}" value="${esc(o)}" placeholder="Option ${LABELS[oi]}…" style="flex:1" />
            <input type="radio" class="correct-radio" name="correct_${qi}" data-qi="${qi}" data-oi="${oi}" ${q.correct===oi?'checked':''} title="Correct answer" />
          <\/div>`).join('')}
      <\/div>
      <div class="q-footer">
        <div class="flex items-center gap-2">
          <label class="lbl" style="margin:0">Seconds:</label>
          <input class="input input-sm" type="number" min="5" max="120" style="width:72px"
            data-qi="${qi}" data-field="time" value="${q.timeLimit}" />
        <\/div>
        <button class="btn btn-ghost btn-sm" data-action="remove-q" data-qi="${qi}" style="color:#FF3366;margin-left:auto">✕ Remove<\/button>
      <\/div>
    <\/div>`).join('');

  const canStart = S.status !== 'active';
  return `
    <div id="questions-wrap">${qs}<\/div>
    <div class="build-actions">
      <button class="btn btn-ghost" data-action="add-q">+ Add Question<\/button>
      <button class="btn btn-cyan" data-action="start-quiz" ${canStart?'':'disabled'} style="margin-left:auto">🚀 Start Quiz<\/button>
    <\/div>`;
}

/* ── Live Tab ── */
function liveTabHTML() {
  if (S.status === 'waiting') return `
    <div class="card text-center" style="padding:50px">
      <div style="font-size:3rem;margin-bottom:12px">⚡<\/div>
      <p class="text-muted">Start the quiz from the Build tab to see live controls.<\/p>
    <\/div>`;

  if (S.status === 'ended') return `
    <div class="card text-center" style="padding:50px">
      <div style="font-size:3rem;margin-bottom:10px">🎉<\/div>
      <p style="font-family:var(--fd);font-size:1.3rem;margin-bottom:16px">Quiz Complete!<\/p>
      <div class="flex gap-3" style="justify-content:center">
        <button class="btn btn-cyan" data-action="tab-scores">View Scores<\/button>
        <button class="btn btn-ghost" data-action="reset">New Quiz<\/button>
      <\/div>
    <\/div>`;

  const q = S.questions?.[S.qIndex];
  const total = S.questions?.length || 1;
  const answered = S.totalAnswered || 0;
  const parts = (S.participants||[]).length;
  const counts = S.ansCount || [];
  const totalAns = counts.reduce((a,b)=>a+b,0);
  const revealedBtn = S.answersRevealed
    ? `<button class="btn btn-cyan" data-action="next-q">${S.qIndex+1>=total?'End Quiz ✓':'Next →'}<\/button>`
    : `<button class="btn btn-gold" data-action="reveal">Reveal Answers<\/button>`;

  const ansDistHTML = q ? q.options.map((opt, i) => {
    const count = counts[i]||0;
    const pct = totalAns > 0 ? (count/totalAns*100).toFixed(0) : 0;
    const barClr = i === q.correct ? 'var(--green)' : COLORS[i];
    return `
      <div class="ans-bar-wrap">
        <div class="ans-bar-label">
          <span style="color:${COLORS[i]}">${LABELS[i]}. ${esc(opt)}<\/span>
          <span>${count}<\/span>
        <\/div>
        <div class="ans-bar" style="width:${pct}%;background:${barClr}"><\/div>
      <\/div>`;
  }).join('') : '';

  const r = 29, circ = (2 * Math.PI * r).toFixed(2);

  return `
    <div class="live-bar">
      <div>
        <div class="text-sm text-muted mb-1">Q${S.qIndex+1} / ${total}</div>
        <div style="font-family:var(--fd);font-size:1.05rem">${esc(q?.text||'')}<\/div>
      <\/div>
      <div class="flex gap-3 items-center">
        <div class="timer-wrap">
          <svg class="timer-svg" width="70" height="70" viewBox="0 0 70 70">
            <circle cx="35" cy="35" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/>
            <circle id="timer-circle" cx="35" cy="35" r="${r}" fill="none" stroke="#00D4FF" stroke-width="5"
              stroke-dasharray="${circ}" stroke-dashoffset="0" stroke-linecap="round"
              style="transition:stroke-dashoffset 1s linear,stroke .3s"/>
          <\/svg>
          <span id="timer-label" style="font-family:var(--fd);font-size:1.3rem;position:relative;z-index:1;color:#00D4FF"><\/span>
        <\/div>
        ${revealedBtn}
        <button class="btn btn-ghost btn-sm" data-action="reset">Reset<\/button>
      <\/div>
    <\/div>

    <div class="stat-row">
      <div class="stat"><div class="stat-val" style="color:var(--cyan)">${parts}<\/div><div class="stat-lbl">Players<\/div><\/div>
      <div class="stat"><div class="stat-val" style="color:var(--pink)">${answered}<\/div><div class="stat-lbl">Answered<\/div><\/div>
      <div class="stat"><div class="stat-val" style="color:var(--gold)">${total}<\/div><div class="stat-lbl">Questions<\/div><\/div>
    <\/div>

    ${S.answersRevealed || answered > 0 ? `
    <div class="card card-glow mb-4">
      <div class="section-lbl">Answer Distribution<\/div>
      ${ansDistHTML}
    <\/div>` : ''}

    <div class="section-lbl">Connected Players<\/div>
    <div class="chips">
      ${(S.participants||[]).map(p=>`
        <div class="chip">👤 ${esc(p.name)} <span style="color:var(--gold);font-weight:700">${p.score||0}pts<\/span><\/div>
      `).join('') || '<span class="text-muted text-sm">Waiting for players…<\/span>'}
    <\/div>`;
}

/* ── Scores Tab ── */
function scoresTabHTML() {
  const lb = [...(S.participants||[])].sort((a,b)=>(b.score||0)-(a.score||0));
  if (!lb.length) return `<div class="card text-center" style="padding:40px;color:var(--muted)">No players yet.<\/div>`;

  const medals = ['🥇','🥈','🥉'];
  const rows = lb.map((p,i) => `
    <div class="lb-row">
      <div class="lb-rank">${medals[i]||'#'+(i+1)}<\/div>
      <div class="lb-name">${esc(p.name)}<\/div>
      <div class="lb-score">${p.score||0} pts<\/div>
    <\/div>`).join('');

  return `
    <div class="section-lbl mb-3">🏆 Leaderboard<\/div>
    <div class="lb">${rows}<\/div>
    ${S.status==='ended'?`<div class="text-center mt-4"><button class="btn btn-pink" data-action="reset">🔄 New Quiz<\/button><\/div>`:''}`;
}

function bindHostEvents() {
  const main = document.getElementById('main');

  // Tab switching
  main.querySelectorAll('.tab[data-tab]').forEach(btn =>
    btn.addEventListener('click', () => {
      hostTab = btn.dataset.tab;
      const m = document.getElementById('main');
      m.innerHTML = hostWrapHTML();
      bindHostEvents();
      if (S.status === 'active' && S.currentQuestion && hostTab === 'live') {
        startTimer(S.currentQuestion.timeLimit, S.questionStartedAt);
      }
    })
  );

  // Build tab: input mutation (no re-render needed)
  const wrap = document.getElementById('questions-wrap');
  if (wrap) {
    wrap.addEventListener('input', e => {
      const qi = +e.target.dataset.qi;
      const field = e.target.dataset.field;
      if (isNaN(qi)) return;
      if (field === 'text')   draft.questions[qi].text = e.target.value;
      if (field === 'option') draft.questions[qi].options[+e.target.dataset.oi] = e.target.value;
      if (field === 'time')   draft.questions[qi].timeLimit = Math.max(5, Math.min(120, +e.target.value));
    });
    wrap.addEventListener('change', e => {
      if (e.target.classList.contains('correct-radio')) {
        draft.questions[+e.target.dataset.qi].correct = +e.target.dataset.oi;
      }
    });
  }

  // Action buttons
  main.addEventListener('click', e => {
    const action = e.target.closest('[data-action]')?.dataset?.action;
    if (!action) return;
    if (action === 'add-q') {
      draft.questions.push(mkQ());
      const m = document.getElementById('main');
      m.innerHTML = hostWrapHTML();
      bindHostEvents();
    }
    if (action === 'remove-q') {
      const qi = +e.target.closest('[data-action]').dataset.qi;
      if (draft.questions.length > 1) { draft.questions.splice(qi, 1); }
      const m = document.getElementById('main');
      m.innerHTML = hostWrapHTML();
      bindHostEvents();
    }
    if (action === 'start-quiz') {
      const valid = draft.questions.filter(q => q.text.trim() && q.options.every(o => o.trim()));
      if (!valid.length) { alert('Add at least one complete question with all options filled in.'); return; }
      ws_send({ type: 'start_quiz', questions: valid.map(({_id,...q})=>q) });
      hostTab = 'live';
    }
    if (action === 'reveal')    ws_send({ type: 'reveal_answers' });
    if (action === 'next-q')    ws_send({ type: 'next_question' });
    if (action === 'reset')     { ws_send({ type: 'reset' }); draft = { questions: [mkQ()] }; hostTab = 'build'; }
    if (action === 'tab-scores'){ hostTab = 'scores'; const m=document.getElementById('main'); m.innerHTML=hostWrapHTML(); bindHostEvents(); }
  });
}

/* ═══════════════════════════════════════════════════════
   PARTICIPANT VIEW
═══════════════════════════════════════════════════════ */
function renderParticipantView() {
  if (!myName) { renderMain(joinHTML()); return; }

  if (!S.status || S.status === 'waiting') { renderMain(waitHTML()); return; }

  if (S.status === 'ended') { renderMain(endedHTML()); return; }

  // Active quiz
  renderMain(questionHTML());
  if (S.currentQuestion) startTimer(S.currentQuestion.timeLimit, S.questionStartedAt);
}

/* ── Join ── */
function joinHTML() {
  return `
  <div class="wait-screen">
    <div style="font-size:3rem">🎮<\/div>
    <h2 class="wait-title">Join the Quiz<\/h2>
    <p class="wait-sub">Enter your name to participate<\/p>
    <div class="join-box">
      <input id="name-input" class="input" placeholder="Your name…" maxlength="24" autocomplete="off" />
      <button class="btn btn-cyan btn-lg btn-full mt-2" id="btn-enter">Enter Quiz →<\/button>
    <\/div>
  <\/div>`;
}

/* ── Waiting Room ── */
function waitHTML() {
  const count = (S.participants||[]).length;
  return `
  <div class="wait-screen">
    <div style="font-size:3rem">⏳<\/div>
    <h2 class="wait-title">Waiting for Host…<\/h2>
    <p class="wait-sub">The quiz will begin shortly. Stay tuned!</p>
    <div class="badge badge-green mt-2"><span class="dot"><\/span> Connected as ${esc(myName)}<\/div>
    <p class="text-sm text-muted mt-3">${count} player${count!==1?'s':''} in the room<\/p>
    <div class="chips mt-2" style="justify-content:center;max-width:500px">
      ${(S.participants||[]).map(p=>`<div class="chip">👤 ${esc(p.name)}<\/div>`).join('')}
    <\/div>
  <\/div>`;
}

/* ── Question ── */
function questionHTML() {
  const q = S.currentQuestion;
  if (!q) return waitHTML();

  const total   = S.totalQuestions || 1;
  const qIdx    = S.qIndex || 0;
  const answered = S.myAnswer !== null && S.myAnswer !== undefined;
  const correct  = q.correct ?? -1;
  const revealed = S.answersRevealed;
  const showResult = answered || revealed;
  const isCorrect = S.myAnswer === correct;
  const pct = (qIdx / total * 100).toFixed(1);
  const r = 29, circ = (2 * Math.PI * r).toFixed(2);

  const opts = q.options.map((opt, i) => {
    let cls = 'q-opt';
    const bgAlpha = '22';
    let borderClr = COLORS[i] + '55';
    if (showResult) {
      cls += ' no-hover';
      if (i === correct) { cls += ' correct-opt'; borderClr = 'var(--green)'; }
      else if (i === S.myAnswer && !isCorrect) { cls += ' wrong-opt'; }
    } else {
      if (i === S.myAnswer) cls += ' selected';
    }
    return `
      <div class="${cls}" style="background:${COLORS[i]+bgAlpha};border-color:${borderClr}"
        data-opt="${i}">
        <div class="opt-lbl" style="background:${COLORS[i]}">${LABELS[i]}<\/div>
        <span>${esc(opt)}<\/span>
      <\/div>`;
  }).join('');

  let resultCard = '';
  if (answered) {
    const bg = isCorrect ? 'rgba(57,255,20,.07)' : 'rgba(255,51,102,.07)';
    const border = isCorrect ? 'rgba(57,255,20,.3)' : 'rgba(255,51,102,.3)';
    const ptVal = S.myScore || 0;
    resultCard = `
      <div class="result-card" style="background:${bg};border:1px solid ${border}">
        <div style="font-size:2rem">${isCorrect?'✅':'❌'}<\/div>
        <div class="big" style="color:${isCorrect?'var(--green)':'var(--pink)'}">
          ${isCorrect ? 'Correct!' : 'Wrong — ' + esc(q.options[correct]||'')}
        <\/div>
        ${isCorrect?`<div class="text-sm text-muted mt-1">Total score: ${ptVal} pts<\/div>`:''}
        <div class="result-hint">Waiting for the next question…<\/div>
      <\/div>`;
  }

  return `
  <div class="container-sm">
    <div class="flex justify-between items-center mb-3">
      <span class="text-sm text-muted">Q${qIdx+1} / ${total}<\/span>
      <div class="timer-wrap">
        <svg class="timer-svg" width="70" height="70" viewBox="0 0 70 70">
          <circle cx="35" cy="35" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/>
          <circle id="timer-circle" cx="35" cy="35" r="${r}" fill="none" stroke="#00D4FF" stroke-width="5"
            stroke-dasharray="${circ}" stroke-dashoffset="0" stroke-linecap="round"
            style="transition:stroke-dashoffset 1s linear,stroke .3s"/>
        <\/svg>
        <span id="timer-label" style="font-family:var(--fd);font-size:1.3rem;position:relative;z-index:1;color:#00D4FF"><\/span>
      <\/div>
    <\/div>
    <div class="progress"><div class="progress-fill" style="width:${pct}%"><\/div><\/div>

    <div class="card card-glow mb-3">
      <div class="q-text">${esc(q.text)}<\/div>
      <div class="q-opts">${opts}<\/div>
    <\/div>
    ${resultCard}
  <\/div>`;
}

/* ── Ended ── */
function endedHTML() {
  const lb = [...(S.participants||[])].sort((a,b)=>(b.score||0)-(a.score||0));
  const myRank = lb.findIndex(p => p.id === myPid) + 1;
  const myScore = S.myScore || 0;
  const medals = ['🥇','🥈','🥉'];

  const rows = lb.slice(0,10).map((p,i) => `
    <div class="lb-row ${p.id===myPid?'me':''}">
      <div class="lb-rank">${medals[i]||'#'+(i+1)}<\/div>
      <div class="lb-name">${esc(p.name)} ${p.id===myPid?'← you':''}<\/div>
      <div class="lb-score">${p.score||0}<\/div>
    <\/div>`).join('');

  return `
  <div class="wait-screen">
    <div style="font-size:3.5rem">🎉<\/div>
    <h2 class="wait-title">Quiz Complete!</h2>
    <div style="font-family:var(--fd);font-size:3rem;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,.5)">${myScore} pts<\/div>
    <p class="wait-sub">You finished #${myRank} of ${lb.length} players<\/p>
    <div class="lb mt-3" style="width:100%;max-width:420px">${rows}<\/div>
  <\/div>`;
}

/* ═══════════════════════════════════════════════════════
   COMMON EVENT BINDING
═══════════════════════════════════════════════════════ */
function bindEvents() {
  // Landing
  document.getElementById('btn-host')?.addEventListener('click', () => {
    myRole = 'host';
    ws_send({ type: 'set_host' });
    render();
  });
  document.getElementById('btn-join')?.addEventListener('click', () => {
    myRole = 'participant';
    render();
  });

  // Join form
  const nameInput = document.getElementById('name-input');
  const btnEnter  = document.getElementById('btn-enter');
  if (nameInput && btnEnter) {
    btnEnter.addEventListener('click', doJoin);
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(); });
    nameInput.focus();
  }

  // Participant answer buttons
  document.querySelectorAll('.q-opt[data-opt]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (S.myAnswer !== null && S.myAnswer !== undefined) return;
      if (S.answersRevealed) return;
      ws_send({ type: 'answer', answerIdx: +btn.dataset.opt });
    });
  });
}

function doJoin() {
  const input = document.getElementById('name-input');
  const name = input?.value?.trim();
  if (!name) return;
  myName = name;
  ws_send({ type: 'join', name, pid: myPid });
  render();
}

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
connect();
render();
</script>
</body>
</html>
