<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Shadab Coaching Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f9f8f6;--white:#fff;--ink:#111110;--mid:#6b6b66;
      --line:#e4e3df;--faint:#f4f3f0;
      --good:#2d6a4f;--bad:#c1121f;--good-bg:#d8f3dc;--bad-bg:#ffe0e0;
      --accent:#1a56db;--accent-bg:#eff6ff;
      --serif:'DM Serif Display',Georgia,serif;
      --sans:'DM Sans',system-ui,sans-serif;
      --r:8px;
    }
    html,body{height:100%}
    body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

    /* NAV */
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;border-bottom:1px solid var(--line);background:var(--white);position:sticky;top:0;z-index:200;gap:12px}
    .brand{font-family:var(--serif);font-size:1.1rem;flex-shrink:0;line-height:1.2}
    .brand small{display:block;font-family:var(--sans);font-size:.62rem;font-weight:500;color:var(--mid);letter-spacing:.04em;text-transform:uppercase}
    .nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    #ci{width:7px;height:7px;border-radius:50%;background:#ccc}
    #ci.on{background:#2d9e6b}#ci.off{background:#c1121f}
    #conn-lbl{font-size:.77rem;color:var(--mid)}

    /* NAV BACK BUTTON */
    .nav-back{display:flex;align-items:center;gap:5px;font-size:.8rem;font-weight:500;color:var(--mid);cursor:pointer;padding:5px 8px;border-radius:var(--r);border:1px solid var(--line);background:var(--white);white-space:nowrap;flex-shrink:0}
    .nav-back:hover{background:var(--faint)}

    /* PROFILE */
    .profile-wrap{position:relative}
    .profile-btn{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 10px;border-radius:var(--r);border:1px solid var(--line);background:var(--white);font-size:.82rem;font-weight:500;transition:background .15s;user-select:none;-webkit-user-select:none}
    .profile-btn:hover{background:var(--faint)}
    .p-avatar{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;flex-shrink:0}
    .p-dropdown{position:fixed;right:8px;top:60px;background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:8px 0;min-width:200px;max-width:calc(100vw - 16px);box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:9999}
    .p-dropdown.hidden{display:none}
    .pd-info{padding:10px 16px;border-bottom:1px solid var(--line)}
    .pd-name{font-weight:600;font-size:.9rem}
    .pd-email{font-size:.77rem;color:var(--mid)}
    .pd-item{display:flex;align-items:center;gap:8px;padding:12px 16px;font-size:.83rem;cursor:pointer;transition:background .1s}
    .pd-item:hover{background:var(--faint)}
    .pd-item:active{background:var(--line)}
    .pd-item.danger{color:var(--bad)}

    /* AUTH */
    .auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px 20px;background:var(--faint)}
    .auth-box{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:36px;width:100%;max-width:400px;box-shadow:0 4px 32px rgba(0,0,0,.06)}
    .auth-logo{font-family:var(--serif);font-size:1.5rem;margin-bottom:4px}
    .auth-sub{font-size:.78rem;color:var(--mid);margin-bottom:28px}
    .auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
    .auth-tab{flex:1;padding:9px;text-align:center;font-size:.83rem;font-weight:500;cursor:pointer;background:var(--faint);color:var(--mid);border:none;transition:background .15s}
    .auth-tab.active{background:var(--ink);color:#fff}
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:.78rem;font-weight:500;color:var(--mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
    .form-input{width:100%;padding:10px 12px;font-family:var(--sans);font-size:.88rem;background:var(--white);color:var(--ink);border:1px solid var(--line);border-radius:var(--r);outline:none;transition:border-color .15s}
    .form-input:focus{border-color:#999}
    .form-input::placeholder{color:#bbb}
    .form-input[readonly]{background:var(--faint);cursor:default;color:var(--mid)}
    .form-error{color:var(--bad);font-size:.8rem;margin-top:10px;min-height:1.2em}

    /* LAYOUT */
    #app{min-height:100vh;display:flex;flex-direction:column}
    main{flex:1}
    h1{font-family:var(--serif);font-size:1.9rem;font-weight:400;line-height:1.15}
    h2{font-family:var(--serif);font-size:1.3rem;font-weight:400;line-height:1.2}
    h3{font-size:.66rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--mid)}
    .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 54px);padding:28px 20px}
    .box{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:32px;width:100%;max-width:400px}
    .page{width:100%;max-width:640px;margin:0 auto;padding:28px 20px}
    .wide{width:100%;max-width:960px;margin:0 auto;padding:24px 20px}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--sans);font-size:.82rem;font-weight:500;padding:8px 16px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    .btn:not(:disabled):hover{opacity:.82}
    .btn:not(:disabled):active{transform:scale(.97)}
    .btn-dark{background:var(--ink);color:#fff}
    .btn-white{background:var(--white);color:var(--ink);border-color:var(--line)}
    .btn-ghost{background:transparent;color:var(--mid);border-color:var(--line)}
    .btn-good{background:var(--good);color:#fff}
    .btn-bad{background:var(--bad);color:#fff}
    .btn-accent{background:var(--accent);color:#fff}
    .btn-warn{background:#d97706;color:#fff}
    .btn-sm{padding:5px 12px;font-size:.74rem}
    .btn-lg{padding:11px 24px;font-size:.9rem}
    .btn-full{width:100%}

    /* UTILS */
    .row{display:flex;align-items:center}.col{display:flex;flex-direction:column}
    .gap2{gap:8px}.gap3{gap:12px}.between{justify-content:space-between}
    .mt1{margin-top:6px}.mt2{margin-top:12px}.mt3{margin-top:20px}.mt4{margin-top:32px}
    .mb1{margin-bottom:6px}.mb2{margin-bottom:12px}.mb3{margin-bottom:20px}
    .muted{color:var(--mid);font-size:.84rem}.small{font-size:.77rem}
    hr{border:none;border-top:1px solid var(--line);margin:16px 0}
    .notice{padding:10px 14px;border-radius:var(--r);font-size:.83rem}
    .n-good{background:var(--good-bg);color:var(--good)}
    .n-bad{background:var(--bad-bg);color:var(--bad)}
    .n-neutral{background:var(--faint);color:var(--ink)}
    .n-accent{background:var(--accent-bg);color:var(--accent)}
    .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:500}
    .tag-green{background:var(--good-bg);color:var(--good)}
    .tag-ink{background:#e8e8e6;color:var(--ink)}
    .dot-live{width:6px;height:6px;border-radius:50%;background:#2d9e6b;animation:blink 1.2s ease-in-out infinite;display:inline-block}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    code{font-size:.75rem;background:var(--faint);padding:1px 5px;border-radius:3px;font-family:monospace}

    /* SCORE BANNER */
    .score-banner{position:sticky;top:54px;z-index:90;background:var(--white);border-bottom:1px solid var(--line);padding:0 16px;display:flex;align-items:center;gap:6px;height:40px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
    .score-banner::-webkit-scrollbar{display:none}
    .sb-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.71rem;font-weight:500;background:var(--faint);border:1px solid var(--line);white-space:nowrap;flex-shrink:0}
    .sb-chip.me{background:#e8f5ee;border-color:#b7dfc7;font-weight:600}
    .sb-pts{color:var(--good);font-weight:700}

    /* HOST SHELL */
    .host-shell{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 54px)}
    .host-sidebar{border-right:1px solid var(--line);background:var(--white);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
    .host-main{padding:22px 26px;overflow-y:auto}
    @media(max-width:700px){.host-shell{grid-template-columns:1fr}.host-sidebar{border-right:none;border-bottom:1px solid var(--line)}}

    /* SIDEBAR SECTIONS */
    .sb-sec{border-bottom:1px solid var(--line)}
    .sb-sec-head{display:flex;align-items:center;justify-content:space-between;padding:9px 2px;cursor:pointer;user-select:none}
    .sb-sec-head:hover h3{color:var(--ink)}
    .sb-sec-head h3{transition:color .1s;margin:0}
    .sb-chevron{font-size:.7rem;color:var(--mid);transition:transform .2s;display:inline-block}
    .sb-chevron.open{transform:rotate(90deg)}
    .sb-body{overflow:hidden;transition:max-height .25s ease}
    .sb-body.closed{max-height:0!important}

    /* Q LIST */
    .q-list{display:flex;flex-direction:column;gap:3px;padding-bottom:8px}
    .q-row{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:background .1s}
    .q-row:hover{background:var(--faint)}
    .q-row.active{background:var(--faint);border-color:var(--line)}
    .q-row.done{opacity:.38}
    .q-row.live{border-color:var(--good);background:var(--good-bg)}
    .q-idx{font-size:.66rem;font-weight:600;color:var(--mid);padding-top:2px;min-width:16px}
    .q-snippet{font-size:.79rem;line-height:1.35;flex:1}
    .q-subj{font-size:.62rem;color:var(--mid);background:var(--faint);border-radius:3px;padding:1px 5px;margin-top:2px;display:inline-block}

    /* JOIN FEED */
    .join-feed{display:flex;flex-direction:column;gap:3px;padding-bottom:8px}
    .join-chip{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--r);background:var(--faint);font-size:.78rem;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .j-av{width:22px;height:22px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:.63rem;font-weight:600;flex-shrink:0}

    /* SCORES */
    .score-list{border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
    .score-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);background:var(--white);font-size:.85rem}
    .score-row:last-child{border-bottom:none}
    .score-rank{min-width:22px;text-align:center;font-size:.73rem;color:var(--mid)}
    .score-name{flex:1}
    .score-pts{font-weight:600}
    .score-row.me{background:#e8f5ee}
    .score-row.top{background:var(--faint)}

    /* ANSWER KEY */
    .key-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;height:120px}
    .key-card{padding:11px 10px;border:1px solid var(--line);border-radius:var(--r);cursor:pointer;text-align:center;transition:background .1s,border-color .1s;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
    .key-card:hover{background:var(--faint)}
    .key-card.selected{background:var(--ink);color:#fff;border-color:var(--ink)}
    .key-card .kl{font-size:.67rem;font-weight:700;opacity:.6;margin-bottom:3px}
    .key-card .kt{font-size:.81rem;line-height:1.3}

    /* LIVE BARS */
    .bar-row{margin-bottom:10px}
    .bar-meta{display:flex;justify-content:space-between;font-size:.76rem;color:var(--mid);margin-bottom:3px}
    .bar-track{height:6px;background:var(--line);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;background:var(--ink);border-radius:3px;transition:width .4s ease}
    .bar-fill.correct{background:var(--good)}
    .bar-names{font-size:.69rem;color:var(--mid);margin-top:2px;line-height:1.5}

    /* PARTICIPANT OPTIONS */
    .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .opt-card{display:flex;align-items:center;gap:10px;padding:13px;border:1.5px solid var(--line);border-radius:var(--r);cursor:pointer;background:var(--white);transition:border-color .15s,background .15s,transform .1s;font-size:.86rem}
    .opt-card:not(.locked):hover{border-color:#999;transform:translateY(-1px)}
    .opt-card:not(.locked):active{transform:scale(.98)}
    .opt-card.chosen{border-color:var(--ink);background:var(--faint)}
    .opt-card.correct{border-color:var(--good);background:var(--good-bg)}
    .opt-card.wrong{opacity:.4}
    .opt-card.locked{cursor:default}
    .opt-key{width:26px;height:26px;flex-shrink:0;border-radius:4px;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:600}
    .opt-card.chosen .opt-key{background:var(--ink);color:#fff}
    .opt-card.correct .opt-key{background:var(--good);color:#fff}
    @media(max-width:480px){.opt-grid{grid-template-columns:1fr}}

    /* TIMER */
    .timer-wrap{margin-bottom:14px}
    .timer-bar-track{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:6px}
    .timer-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .1s linear}
    .timer-bar-fill.urgent{background:var(--bad)}
    .timer-digits{font-size:.8rem;font-weight:600;color:var(--mid);text-align:right}
    .timer-digits.urgent{color:var(--bad)}

    /* STAT STRIP */
    .stat-strip{display:flex;gap:20px;padding:10px 0;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
    .stat-item .stat-val{font-weight:600;font-size:1.05rem}
    .stat-item .stat-lbl{font-size:.67rem;color:var(--mid);text-transform:uppercase;letter-spacing:.07em}

    /* WAITING */
    .wait-shell{display:flex;flex-direction:column;align-items:center;min-height:calc(100vh - 54px);padding:36px 20px}
    .wait-header{text-align:center;margin-bottom:24px}
    .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;width:100%;max-width:560px}
    .student-chip{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--white);border:1px solid var(--line);border-radius:var(--r);font-size:.82rem;animation:fadeUp .35s ease}
    .s-av{width:25px;height:25px;border-radius:50%;background:var(--faint);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;flex-shrink:0}

    /* VOICE */
    .voice-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--faint);border-radius:var(--r);font-size:.8rem;margin-bottom:12px;border:1px solid var(--line)}
    .mic-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
    .mic-dot.live{background:#2d9e6b;box-shadow:0 0 0 3px rgba(45,158,107,.18);animation:blink 1s infinite}
    .mic-dot.err{background:var(--bad)}

    /* RESOURCE BROWSER */
    .subject-list{display:flex;flex-direction:column;gap:8px;margin:14px 0}
    .subject-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--faint);border:1px solid var(--line);border-radius:var(--r)}
    .subject-name{flex:1;font-size:.87rem;font-weight:500}
    .subject-count{font-size:.74rem;color:var(--mid)}
    .q-count-input{width:60px;padding:5px 8px;font-size:.83rem;border:1px solid var(--line);border-radius:var(--r);text-align:center;outline:none}
    .q-count-input:focus{border-color:#999}
    .timer-input-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 12px;background:var(--faint);border-radius:var(--r);border:1px solid var(--line)}

    /* INSPECT TABLE */
    .itbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r)}
    .itbl{border-collapse:collapse;width:100%;font-size:.79rem}
    .itbl th{padding:8px 12px;text-align:left;border-bottom:1px solid var(--line);background:var(--faint);font-size:.65rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mid);white-space:nowrap}
    .itbl td{padding:8px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
    .itbl tr:last-child td{border-bottom:none}
    .itbl tbody tr:hover td{background:#fafaf8;cursor:pointer}
    .c-ok{color:var(--good);font-weight:600}.c-bad{color:var(--bad)}.c-nil{color:#ccc}
    .detail-wrap{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-top:14px}
    .detail-head{padding:11px 14px;border-bottom:1px solid var(--line);background:var(--faint);display:flex;align-items:center;justify-content:space-between}
    .detail-row{padding:10px 14px;border-bottom:1px solid var(--line);font-size:.83rem}
    .detail-row:last-child{border-bottom:none}
    .detail-q{color:var(--mid);font-size:.74rem;margin-bottom:4px}
    .ans-chips{display:flex;gap:5px;flex-wrap:wrap}
    .ans-chip{padding:2px 8px;border-radius:20px;font-size:.73rem;font-weight:500}
    .ac-good{background:var(--good-bg);color:var(--good)}
    .ac-bad{background:var(--bad-bg);color:var(--bad)}
    .ac-none{background:var(--faint);color:var(--mid)}

    /* LEADERBOARD PANEL */
    .lb-panel{background:var(--white);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;width:100%;max-width:480px;margin-top:20px}
    .lb-head{padding:11px 14px;border-bottom:1px solid var(--line);background:var(--faint);display:flex;align-items:center;justify-content:space-between}
    .lb-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);font-size:.85rem}
    .lb-row:last-child{border-bottom:none}
    .lb-row.me{background:#e8f5ee}
    .lb-sessions{font-size:.72rem;color:var(--mid);margin-right:6px}

    /* ANIMATIONS */
    @keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    /* NAV RESPONSIVE */
    @media(max-width:480px){
      nav{padding:0 10px;gap:6px}
      .brand small{display:none}
      #conn-lbl{display:none}
      .profile-btn>span:last-child{display:none}
    }

    /* SCHEDULE CARDS */
    .sched-card{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
    .sched-date-blk{background:var(--ink);color:#fff;border-radius:7px;padding:5px 9px;text-align:center;min-width:42px;flex-shrink:0}
    .sched-day{font-size:1.1rem;font-weight:700;line-height:1}
    .sched-mon{font-size:.59rem;text-transform:uppercase;letter-spacing:.04em;opacity:.75}
    .sched-info{flex:1;min-width:0}
    .sched-title{font-weight:600;font-size:.88rem;margin-bottom:1px}
    .sched-meta{font-size:.74rem;color:var(--mid)}
    .sched-cd{font-size:.71rem;color:var(--accent);font-weight:600;margin-top:2px}
    .sched-del{font-size:.75rem;color:var(--bad);cursor:pointer;padding:4px 8px;border-radius:5px;flex-shrink:0}
    .sched-del:hover{background:var(--bad-bg)}

    /* PROFILE PAGE */
    .profile-page{max-width:620px;margin:0 auto;padding:24px 20px;animation:slideUp .22s ease}
    .profile-hero{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:18px;background:var(--white);border:1px solid var(--line);border-radius:12px}
    .ph-avatar{width:58px;height:58px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:600;flex-shrink:0}
    .ph-info{min-width:0}
    .ph-name{font-size:1.05rem;font-weight:600;line-height:1.3}
    .ph-email{font-size:.75rem;color:var(--mid)}
    .ph-summary{font-size:.75rem;color:var(--mid);margin-top:4px}
    .ptabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:20px;overflow-x:auto}
    .ptab{padding:8px 16px;font-size:.82rem;font-weight:500;color:var(--mid);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s,border-color .15s}
    .ptab.active{color:var(--ink);border-bottom-color:var(--ink)}
    .ptab:hover:not(.active){color:var(--ink)}

  </style>

<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let S={}, role=null, myPid=null, myName=null, hostAuthed=false;
let currentUser=null;
let authToken=null;

// Profile page
let showingProfile=false, profileTab='overview';

// Score tracking for +N badge
let prevMyScore=0, scoreGain=0;

// Host
let questions=[], selIdx=-1, answerKey=-1, inspectPid=null;
let sidebarQOpen=false, sidebarStudOpen=false, sidebarScoreOpen=false, sidebarSchedOpen=false;
let hostTimerSeconds=0;

// Resource browser
let repoPath=null;
let subjects=[];
let repoLoading=false;

// Voice (host)
let localStream=null;
const peerConns={};

// Voice (student)
let remoteConn=null;

// Timer
let timerInterval=null;

// Push question debounce
let pushing=false, pushTimeout=null;

// Halt flow
let showingHalted=false, haltedCountdown=0, haltedTimer=null, haltedSnapshot=[];

// Home tabs
let homeSection='home'; // 'home' | 'leaderboard'

// All-time leaderboard cache
let allTimeLB=null;

// Server schedules (shared between students and host)
let serverSchedules=null;
let hostSchedules=[]; // schedules shown in host panel

const STUN={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

// ── GITHUB CONFIG ─────────────────────────────────────────────────────────
const GITHUB_TOKEN = ''; // Set your GitHub personal access token here
const GITHUB_REPO  = 'raeist-user/quizzap';
const GITHUB_BRANCH = 'main';

/* ══════════════════════════════════════
   SOUNDS (Web Audio API)
══════════════════════════════════════ */
let audioCtx=null;
function getAudio(){ return audioCtx||(audioCtx=new(window.AudioContext||window.webkitAudioContext)()); }
function playClick(){
  try{
    const a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.frequency.value=900;o.type='sine';
    g.gain.setValueAtTime(.15,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.08);
    o.start();o.stop(a.currentTime+.08);
  }catch(e){}
}
function playCorrect(){
  try{
    const a=getAudio(); const t=a.currentTime;
    [523,659,784,1047].forEach((f,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.frequency.value=f;o.type='sine';
      const s=t+i*.13;
      g.gain.setValueAtTime(0,s);
      g.gain.linearRampToValueAtTime(.25,s+.05);
      g.gain.exponentialRampToValueAtTime(.001,s+.35);
      o.start(s);o.stop(s+.35);
    });
  }catch(e){}
}
function playWrong(){
  try{
    const a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type='sawtooth';o.frequency.value=160;
    g.gain.setValueAtTime(.2,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);
    o.start();o.stop(a.currentTime+.5);
  }catch(e){}
}

/* ══════════════════════════════════════
   AUTH
══════════════════════════════════════ */
function loadStoredAuth(){
  try{
    const t=localStorage.getItem('scc_token');
    const u=localStorage.getItem('scc_user');
    if(t&&u){ authToken=t; currentUser=JSON.parse(u); }
  }catch(e){}
}
function saveAuth(token,user){ authToken=token; currentUser=user; localStorage.setItem('scc_token',token); localStorage.setItem('scc_user',JSON.stringify(user)); }
function clearAuth(){ authToken=null; currentUser=null; localStorage.removeItem('scc_token'); localStorage.removeItem('scc_user'); }

/* ── Navigation-state persistence (survives reload) ─────────────────────── */
const NAV_KEY='scc_nav';
function saveNavState(){
  try{
    // Only persist states that make sense to restore after reload.
    // We never restore a mid-question live session since WS reconnect handles that.
    const st={
      role: role,
      hostAuthed: hostAuthed,
      myName: myName,
      showingProfile: showingProfile,
      profileTab: profileTab,
      homeSection: homeSection,
    };
    sessionStorage.setItem(NAV_KEY, JSON.stringify(st));
  }catch(e){}
}
function loadNavState(){
  try{
    const raw=sessionStorage.getItem(NAV_KEY);
    if(!raw) return;
    const st=JSON.parse(raw);
    role          = st.role          ?? null;
    hostAuthed    = st.hostAuthed    ?? false;
    myName        = st.myName        ?? null;
    showingProfile= st.showingProfile?? false;
    profileTab    = st.profileTab    ?? 'overview';
    homeSection   = st.homeSection   ?? 'home';
    // myPid already persisted separately in sessionStorage by existing code
    if(myName) myPid = sessionStorage.getItem('qz_pid') || null;
  }catch(e){}
}

async function apiPost(path,body,withAuth){
  const h={'Content-Type':'application/json'};
  if(withAuth&&authToken) h['Authorization']='Bearer '+authToken;
  const r=await fetch(path,{method:'POST',headers:h,body:JSON.stringify(body)});
  const d=await r.json();
  if(!r.ok) throw new Error(d.error||'Request failed');
  return d;
}
async function apiDel(path){
  const h={'Authorization':'Bearer '+authToken};
  const r=await fetch(path,{method:'DELETE',headers:h});
  const d=await r.json();
  if(!r.ok) throw new Error(d.error||'Failed');
  return d;
}

// ── SESSION HISTORY ──────────────────────────────────────────────────────
function histKey(){ return 'scc_history_'+(currentUser?.id||'x'); }
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(histKey())||'[]'); }catch{ return []; } }
function saveSession(e){ const h=loadHistory(); h.unshift(e); localStorage.setItem(histKey(),JSON.stringify(h.slice(0,100))); }
function computeStats(){
  const h=loadHistory(); if(!h.length) return null;
  const totalCorrect=h.reduce((s,e)=>s+(e.correct||0),0);
  const totalQs=h.reduce((s,e)=>s+(e.total||0),0);
  const accuracy=totalQs?Math.round(totalCorrect/totalQs*100):0;
  const bestScore=Math.max(...h.map(e=>e.score||0));
  const bestRank=Math.min(...h.map(e=>e.rank||999));
  const today=new Date(); today.setHours(0,0,0,0);
  const dayMs=86400000;
  const days=[...new Set(h.map(e=>{ const d=new Date(e.date); d.setHours(0,0,0,0); return d.getTime(); }))].sort((a,b)=>b-a);
  let streak=0;
  if(days.length&&(today.getTime()-days[0])<=dayMs){
    for(let i=0;i<days.length;i++){ if(Math.abs(days[i]-(today.getTime()-i*dayMs))<=dayMs) streak++; else break; }
  }
  return {sessions:h.length,totalCorrect,totalQs,accuracy,bestScore,bestRank:bestRank===999?null:bestRank,streak};
}

// ── SCHEDULES (server-side) ───────────────────────────────────────────────
function cdStr(ts){ const d=ts-Date.now(); if(d<=0)return'Now/Overdue'; const h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000); if(h>48)return'in '+Math.floor(h/24)+' days'; if(h>0)return'in '+h+'h '+m+'m'; return'in '+m+'m'; }

async function fetchSchedules(){
  try{
    const r=await fetch('/api/schedules');
    const d=await r.json();
    serverSchedules=d.schedules||[];
    render();
  }catch(e){ serverSchedules=[]; }
}

async function fetchHostSchedules(){
  try{
    const r=await fetch('/api/schedules');
    const d=await r.json();
    hostSchedules=d.schedules||[];
    render();
  }catch(e){ hostSchedules=[]; }
}

// ── ALL-TIME LEADERBOARD ──────────────────────────────────────────────────
async function fetchLeaderboard(){
  try{
    const r=await fetch('/api/leaderboard');
    const d=await r.json();
    allTimeLB=d.leaderboard||[];
    render();
  }catch(e){ allTimeLB=[]; }
}

/* ══════════════════════════════════════
   WEBSOCKET
══════════════════════════════════════ */
let ws, myCid=null;
const WS_URL=`${location.protocol==='https:'?'wss':'ws'}://${location.host}`;
let prevStatus=null;

function connect(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{
    setConn(true);
    if(role==='host'&&hostAuthed)          send({type:'set_host',password:HOST_PASSWORD_INPUT||''});
    else if(role==='participant'&&myName)  send({type:'join',name:myName,pid:myPid,userId:currentUser?.id});
  };
  ws.onmessage=async e=>{
    const m=JSON.parse(e.data);
    switch(m.type){
      case 'hello':     myCid=m.cid; break;
      case 'kicked':
        role=null; myName=null; myPid=null; showingProfile=false; prevMyScore=0; scoreGain=0;
        sessionStorage.removeItem('qz_pid'); sessionStorage.removeItem(NAV_KEY);
        alert('The host has shut down the session.');
        render(); break;
      case 'halted':
        // Host halted the session — show leaderboard + goodbye for 30s
        { const haltedParts=m.payload?.participants||S.participants||[];
          haltedSnapshot=haltedParts; }
        role=null; myName=null; myPid=null; showingProfile=false; prevMyScore=0; scoreGain=0;
        sessionStorage.removeItem('qz_pid'); sessionStorage.removeItem(NAV_KEY);
        showingHalted=true; haltedCountdown=30;
        render();
        if(haltedTimer) clearInterval(haltedTimer);
        haltedTimer=setInterval(()=>{
          haltedCountdown--;
          const el=document.getElementById('halt-countdown');
          if(el) el.textContent=haltedCountdown;
          // Animate the ring
          const ring=document.getElementById('halt-ring');
          if(ring){ const pct=(haltedCountdown/30)*283; ring.style.strokeDashoffset=283-pct; }
          if(haltedCountdown<=0){
            clearInterval(haltedTimer); haltedTimer=null;
            showingHalted=false; haltedSnapshot=[];
            fetchSchedules();
            render();
          }
        },1000);
        break;
      case 'state': {
        const ns=m.payload.status, inc=m.payload.myScore||0;
        if(ns==='idle'&&prevStatus==='revealed'){ scoreGain=inc-prevMyScore; if(scoreGain<0)scoreGain=0; }
        if(ns==='question'){
          scoreGain=0; prevMyScore=inc;
          // Clear push-stuck state
          pushing=false;
          if(pushTimeout){ clearTimeout(pushTimeout); pushTimeout=null; }
        }
        if(ns==='idle'&&prevStatus==='idle'){ prevMyScore=inc; }
        // Save session on end
        if(ns==='ended'&&prevStatus!=='ended'&&role==='participant'&&myPid){
          const pts=m.payload.participants||[];
          const sorted2=[...pts].sort((a,b)=>(b.score||0)-(a.score||0));
          const myRank2=sorted2.findIndex(p=>p.id===myPid)+1;
          const hist2=m.payload.myHistory||[];
          const correct2=hist2.filter(h=>h.myAnswer!==null&&h.myAnswer===h.correct).length;
          saveSession({date:new Date().toISOString(),score:inc,total:hist2.length,rank:myRank2||0,participants:pts.length,correct:correct2});
        }
        // Detect answer reveal sounds
        if(role==='participant'){
          if(ns==='revealed'&&prevStatus==='question'){
            const myAns=m.payload.myAnswer;
            const correct=m.payload.correct;
            if(myAns!==null&&myAns!==undefined){
              setTimeout(()=>{ myAns===correct?playCorrect():playWrong(); },200);
            }
          }
        }
        prevStatus=ns;
        S=m.payload; render(); break;
      }
      case 'joined':    myPid=m.pid; sessionStorage.setItem('qz_pid',m.pid); break;
      case 'auth_ok':   hostAuthed=true; fetchHostSchedules(); browseRepo(); navPush(); render(); break;
      case 'auth_fail': { const el=document.getElementById('pw-err'); if(el)el.textContent='Incorrect password.'; break; }
      case 'left':      doLeave(); break;
      case 'peer_list': for(const cid of m.cids) await hostCallPeer(cid); break;
      case 'rtc_new_peer': if(role==='host') await hostCallPeer(m.cid); break;
      case 'rtc_offer':    if(role==='participant') await studentHandleOffer(m.signal); break;
      case 'rtc_answer':   if(role==='host') await hostHandleAnswer(m.fromCid,m.signal); break;
      case 'rtc_ice':
        if(role==='host'&&peerConns[m.fromCid]) peerConns[m.fromCid].addIceCandidate(new RTCIceCandidate(m.signal)).catch(()=>{});
        if(role==='participant'&&remoteConn)     remoteConn.addIceCandidate(new RTCIceCandidate(m.signal)).catch(()=>{});
        break;
    }
  };
  ws.onclose=()=>{ setConn(false); setTimeout(connect,2000); };
  ws.onerror=()=>ws.close();
}
function send(d){ if(ws?.readyState===1) ws.send(JSON.stringify(d)); }
function setConn(on){ document.getElementById('ci').className=on?'on':'off'; document.getElementById('conn-lbl').textContent=on?'connected':'reconnecting…'; }

// Store host password input for reconnection
let HOST_PASSWORD_INPUT='';

/* ══════════════════════════════════════
   WEBRTC HOST
══════════════════════════════════════ */
async function startMic(){
  try{
    if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
    localStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true},video:false});
    render(); send({type:'get_peers'});
  }catch(e){ alert('Microphone access denied.'); }
}
function stopMic(){
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  Object.values(peerConns).forEach(pc=>pc.close());
  Object.keys(peerConns).forEach(k=>delete peerConns[k]);
  render();
}
async function hostCallPeer(cid){
  if(!localStream) return;
  if(peerConns[cid]){peerConns[cid].close();delete peerConns[cid];}
  const pc=new RTCPeerConnection(STUN); peerConns[cid]=pc;
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=ev=>{ if(ev.candidate) send({type:'rtc_ice_to_peer',toCid:cid,signal:ev.candidate.toJSON()}); };
  pc.onconnectionstatechange=()=>{ if(['failed','closed','disconnected'].includes(pc.connectionState)){pc.close();delete peerConns[cid];} };
  try{ const offer=await pc.createOffer(); await pc.setLocalDescription(offer); send({type:'rtc_offer',toCid:cid,signal:{type:pc.localDescription.type,sdp:pc.localDescription.sdp}}); }catch(e){}
}
async function hostHandleAnswer(cid,sdp){
  const pc=peerConns[cid]; if(!pc||pc.signalingState==='stable') return;
  try{ await pc.setRemoteDescription(new RTCSessionDescription(sdp)); }catch(e){}
}

/* ══════════════════════════════════════
   WEBRTC STUDENT
══════════════════════════════════════ */
async function studentHandleOffer(sdp){
  if(remoteConn){try{remoteConn.close();}catch(e){} remoteConn=null;}
  const pc=new RTCPeerConnection(STUN); remoteConn=pc;
  pc.onicecandidate=ev=>{ if(ev.candidate) send({type:'rtc_ice_to_host',signal:ev.candidate.toJSON()}); };
  pc.ontrack=ev=>{ const a=document.getElementById('remote-audio'); if(a&&a.srcObject!==ev.streams[0]){a.srcObject=ev.streams[0];a.play().catch(()=>{});} updateMicDot(); };
  pc.oniceconnectionstatechange=()=>updateMicDot();
  try{ await pc.setRemoteDescription(new RTCSessionDescription(sdp)); const ans=await pc.createAnswer(); await pc.setLocalDescription(ans); send({type:'rtc_answer',signal:{type:pc.localDescription.type,sdp:pc.localDescription.sdp}}); }catch(e){}
}
function updateMicDot(){ const d=document.getElementById('mic-dot'); if(!d)return; const st=remoteConn?.iceConnectionState; d.className='mic-dot'+(st==='connected'||st==='completed'?' live':st==='failed'?' err':''); }

/* ══════════════════════════════════════
   TIMER
══════════════════════════════════════ */
function startTimerDisplay(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  const total=S.timerSeconds, start=S.questionPushedAt;
  if(!total||!start||S.status!=='question') return;
  function tick(){
    const remaining=Math.max(0, total-(Date.now()-start)/1000);
    const pct=(remaining/total)*100;
    const urgent=remaining<total*0.25;
    // Student timer bar
    const bar=document.getElementById('timer-bar');
    const dig=document.getElementById('timer-digits');
    if(bar&&dig){
      bar.style.width=pct+'%';
      bar.className='timer-bar-fill'+(urgent?' urgent':'');
      dig.textContent=Math.ceil(remaining)+'s';
      dig.className='timer-digits'+(urgent?' urgent':'');
    }
    // Host timer bar (in host controller)
    const hBar=document.getElementById('host-timer-bar');
    const hDig=document.getElementById('host-timer-digits');
    if(hBar&&hDig){
      hBar.style.width=pct+'%';
      hBar.style.background=urgent?'var(--bad)':'var(--accent)';
      hDig.textContent=Math.ceil(remaining)+'s';
      hDig.style.color=urgent?'var(--bad)':'var(--ink)';
    }
    if(remaining<=0){
      clearInterval(timerInterval);timerInterval=null;
      document.querySelectorAll('.opt-card').forEach(c=>c.classList.add('locked'));
    }
  }
  tick(); timerInterval=setInterval(tick,100);
}

/* ══════════════════════════════════════
   PARSER
══════════════════════════════════════ */
function parseQuestions(text){
  const out=[],lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  for(let i=0;i<lines.length;i++){
    const qLine=lines[i],oLine=lines[i+1]||'';
    const m=oLine.match(/\(A\)([^,(]+)[,，]\s*\(B\)([^,(]+)[,，]\s*\(C\)([^,(]+)[,，]\s*\(D\)([^,(]+)/i);
    if(m){out.push({text:qLine.replace(/^\d+[.)]\s*/,'').trim(),options:[m[1].trim(),m[2].trim(),m[3].trim(),m[4].trim()]});i++;}
  }
  return out;
}

let uploadMsg='';

function ghHeaders(){
  const h={'Accept':'application/vnd.github+json','Content-Type':'application/json'};
  if(GITHUB_TOKEN) h['Authorization']='Bearer '+GITHUB_TOKEN;
  return h;
}

async function browseRepo(){
  repoPath=GITHUB_REPO;
  const msg=document.getElementById('repo-msg');
  if(msg) msg.innerHTML='<div class="notice n-neutral mt2">Loading subjects…</div>';
  repoLoading=true; render();
  try{
    const res=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/resources?ref=${GITHUB_BRANCH}`,{headers:ghHeaders()});
    if(!res.ok) throw new Error(`GitHub API ${res.status}: Check token and repo.`);
    const items=await res.json();
    const dirs=items.filter(i=>i.type==='dir');
    if(!dirs.length) throw new Error('No subject folders found inside "resources" folder.');
    subjects=dirs.map(d=>({name:d.name,path:d.path,questions:[],count:0}));
    repoLoading=false;
    if(msg) msg.innerHTML='';
    render();
  }catch(e){ repoLoading=false; if(msg) msg.innerHTML=`<div class="notice n-bad mt2">${esc(e.message)}</div>`; render(); }
}

async function loadUploadFolders(){
  try{
    const res=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/resources?ref=${GITHUB_BRANCH}`,{headers:ghHeaders()});
    if(!res.ok) throw new Error(`GitHub API ${res.status}`);
    const items=await res.json();
    uploadSubjects=items.filter(i=>i.type==='dir').map(d=>({name:d.name,path:d.path}));
    render();
  }catch(e){ uploadSubjects=[]; render(); }
}

async function createFolder(){
  const inp=document.getElementById('new-folder-name');
  if(!inp) return;
  const name=inp.value.trim().replace(/[^a-zA-Z0-9_\- ]/g,'');
  if(!name){setUploadMsg('Folder name required','bad');return;}
  if(!GITHUB_TOKEN){setUploadMsg('GitHub token not set','bad');return;}
  setUploadMsg('Creating folder…','neutral');
  try{
    const path=`resources/${name}/.gitkeep`;
    const res=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`,{
      method:'PUT',headers:ghHeaders(),
      body:JSON.stringify({message:`Create ${name} folder`,content:btoa(''),branch:GITHUB_BRANCH})
    });
    if(!res.ok) throw new Error(`GitHub API ${res.status}`);
    setUploadMsg(`Folder "${name}" created!`,'good');
    inp.value='';
    await loadUploadFolders();
  }catch(e){setUploadMsg(e.message,'bad');}
}

async function openFolderEdit(folderName){
  manageFolder=folderName; editingContent=''; editingSha=null;
  setUploadMsg('Loading questions.txt…','neutral');
  render();
  try{
    const res=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/resources/${folderName}/questions.txt?ref=${GITHUB_BRANCH}`,{headers:ghHeaders()});
    if(res.status===404){ editingContent=''; editingSha=null; setUploadMsg('No questions.txt yet. Write or upload one below.','neutral'); render(); return; }
    if(!res.ok) throw new Error(`GitHub API ${res.status}`);
    const data=await res.json();
    editingSha=data.sha;
    // Properly decode UTF-8 content (handles Hindi and other non-ASCII)
    const bytes=Uint8Array.from(atob(data.content.replace(/\n/g,'')),c=>c.charCodeAt(0));
    editingContent=new TextDecoder('utf-8').decode(bytes);
    setUploadMsg('','');
    render();
    setTimeout(()=>{ const ta=document.getElementById('q-editor'); if(ta){ ta.value=editingContent; ta.focus(); } },50);
  }catch(e){setUploadMsg(e.message,'bad');}
}

async function saveEditorContent(){
  if(!manageFolder){setUploadMsg('No folder selected','bad');return;}
  if(!GITHUB_TOKEN){setUploadMsg('GitHub token not set','bad');return;}
  const ta=document.getElementById('q-editor');
  const content=ta?ta.value:'';
  if(!content.trim()){setUploadMsg('Content is empty','bad');return;}
  setUploadMsg('Saving…','neutral');
  try{
    const path=`resources/${manageFolder}/questions.txt`;
    const body={message:`Update ${manageFolder}/questions.txt`,content:btoa(unescape(encodeURIComponent(content))),branch:GITHUB_BRANCH};
    if(editingSha) body.sha=editingSha;
    const res=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`,{
      method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)
    });
    if(!res.ok) throw new Error(`GitHub API ${res.status}`);
    const data=await res.json();
    editingSha=data.content?.sha||editingSha;
    setUploadMsg('Saved successfully!','good');
  }catch(e){setUploadMsg(e.message,'bad');}
}

async function uploadQuestionsFile(){
  if(!manageFolder){setUploadMsg('Select a folder first','bad');return;}
  if(!GITHUB_TOKEN){setUploadMsg('GitHub token not set','bad');return;}
  const inp=document.getElementById('file-upload-inp');
  if(!inp||!inp.files.length){setUploadMsg('Choose a .txt file first','bad');return;}
  const file=inp.files[0];
  if(!file.name.endsWith('.txt')){setUploadMsg('Only .txt files allowed','bad');return;}
  setUploadMsg('Reading file…','neutral');
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const content=e.target.result;
    try{
      setUploadMsg('Uploading…','neutral');
      const path=`resources/${manageFolder}/questions.txt`;
      const body={message:`Upload ${manageFolder}/questions.txt`,content:btoa(unescape(encodeURIComponent(content))),branch:GITHUB_BRANCH};
      if(editingSha) body.sha=editingSha;
      const res=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`,{
        method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)
      });
      if(!res.ok) throw new Error(`GitHub API ${res.status}`);
      const data=await res.json();
      editingSha=data.content?.sha||editingSha;
      editingContent=content;
      setUploadMsg('Uploaded successfully!','good');
      render();
      setTimeout(()=>{ const ta=document.getElementById('q-editor'); if(ta) ta.value=content; },50);
    }catch(err){setUploadMsg(err.message,'bad');}
  };
  reader.readAsText(file);
}

function setUploadMsg(msg,type){
  uploadMsg=msg?`<div class="notice n-${type} mt2">${esc(msg)}</div>`:'';
  const el=document.getElementById('upload-msg');
  if(el) el.innerHTML=uploadMsg;
}

async function generateQuiz(){
  const msg=document.getElementById('gen-msg'); if(!msg)return;
  const chosen=subjects.filter(s=>s.count>0);
  if(!chosen.length){msg.innerHTML='<div class="notice n-bad mt2">Set at least one subject count above 0.</div>';return;}
  msg.innerHTML='<div class="notice n-neutral mt2">Fetching questions…</div>';
  let all=[];
  try{
    for(const s of chosen){
      const rawUrl=`https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${s.path}/questions.txt`;
      const headers={}; if(GITHUB_TOKEN) headers['Authorization']='Bearer '+GITHUB_TOKEN;
      const res=await fetch(rawUrl,{headers});
      if(!res.ok) throw new Error(`Could not fetch ${s.name}/questions.txt`);
      const parsed=parseQuestions(await res.text());
      if(!parsed.length) throw new Error(`No valid questions in ${s.name}/questions.txt`);
      const shuffled=parsed.sort(()=>Math.random()-.5).slice(0,s.count);
      shuffled.forEach(q=>{q.subject=s.name;});
      all=[...all,...shuffled];
    }
    questions=all; selIdx=0; answerKey=-1;
    msg.innerHTML=''; render();
  }catch(e){ msg.innerHTML=`<div class="notice n-bad mt2">${esc(e.message)}</div>`; }
}

function scoreBannerHTML(){
  if(!myPid||(S.status!=='question'&&S.status!=='revealed')) return '';
  const sorted=[...(S.participants||[])].sort((a,b)=>(b.score||0)-(a.score||0));

  const medals=['🥇','🥈','🥉'];
  const myRank=sorted.findIndex(p=>p.id===myPid)+1;
  const myP=sorted.find(p=>p.id===myPid);
  let chips=sorted.slice(0,5).map((p,i)=>`<div class="sb-chip${p.id===myPid?' me':''}"><span>${medals[i]||'#'+(i+1)}</span><span>${esc(p.name.length>12?p.name.slice(0,11)+'…':p.name)}</span><span class="sb-pts">${p.score||0}</span></div>`).join('');
  if(myRank>5&&myP) chips+=`<span style="color:var(--line);font-size:.8rem">···</span><div class="sb-chip me"><span>#${myRank}</span><span>${esc(myP.name.slice(0,11))}</span><span class="sb-pts">${myP.score||0}</span></div>`;

      <div class="form-row"><label>New password</label><input class="form-input" type="password" id="p-pw-new" placeholder="Min 6 characters"/></div>
      <div class="form-row"><label>Confirm new</label><input class="form-input" type="password" id="p-pw-new2" placeholder="Repeat new password"/></div>
      <button class="btn btn-dark btn-sm" id="btn-save-pw">Update password</button>
      <div class="form-msg" id="p-pw-msg"></div>
    </div>`;
  }

  const disp=u.displayName||u.name;
  const summ=stats?`${stats.sessions} session${stats.sessions!==1?'s':''} · ${stats.accuracy}% accuracy${stats.streak>0?' · 🔥 '+stats.streak+' day streak':''}`:null;
  return `<div class="profile-page">
    <div class="row gap2 mb3">
      <span style="font-size:.95rem;font-weight:600">My Profile</span>
    </div>
    <div class="profile-hero">
      <div class="ph-avatar">${initials}</div>
      <div class="ph-info">
        <div class="ph-name">${esc(disp)}${u.displayName&&u.displayName!==u.name?`<span style="font-size:.72rem;color:var(--mid);font-weight:400;margin-left:6px">(${esc(u.name)})</span>`:''}</div>
        <div class="ph-email">${esc(u.email)}</div>
        ${summ?`<div class="ph-summary">${summ}</div>`:''}
      </div>
    </div>
    <div class="ptabs">${tabsHTML}</div>
    ${body}
  </div>`;
}

/* ══════════════════════════════════════
   SCHEDULE OVERLAY (host)
══════════════════════════════════════ */
function schedOverlayHTML(){
  if(!sidebarSchedOpen) return '';
  const upcoming=hostSchedules.filter(s=>s.ts>Date.now()-3600000);
  const schedRows=upcoming.length
    ?upcoming.map(s=>{
      const d=new Date(s.ts);
      return `<div class="sched-card" style="margin-bottom:6px;padding:8px 10px">
        <div class="sched-date-blk" style="min-width:36px;padding:4px 7px"><div class="sched-day" style="font-size:.95rem">${d.getDate()}</div><div class="sched-mon">${d.toLocaleString('en',{month:'short'})}</div></div>
        <div class="sched-info">
          <div class="sched-title" style="font-size:.8rem">${esc(s.title)}</div>
          <div class="sched-meta">${d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}${s.notes?' · '+esc(s.notes):''}</div>
          <div class="sched-cd">${cdStr(s.ts)}</div>
        </div>
        <span class="sched-del" data-sdel="${s._id}">✕</span>
      </div>`;
    }).join('')
    :'<p class="muted small" style="padding:4px 0 10px">No upcoming sessions.</p>';
  return `<div id="sched-overlay" style="position:absolute;bottom:0;left:0;right:0;background:var(--white);border-top:2px solid var(--line);border-radius:12px 12px 0 0;padding:16px;z-index:300;max-height:70%;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.1)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-weight:700;font-size:.9rem">📅 Schedule</span>
      <button class="btn btn-ghost btn-sm" id="btn-sched-close">✕</button>
    </div>
    ${schedRows}
    <hr/>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px">
      <input class="form-input" id="sched-title" placeholder="Session title" maxlength="60" style="font-size:.82rem;padding:8px 10px"/>
      <input class="form-input" type="datetime-local" id="sched-dt" style="font-size:.82rem;padding:8px 10px"/>
      <input class="form-input" id="sched-notes" placeholder="Notes (optional)" maxlength="100" style="font-size:.82rem;padding:8px 10px"/>
      <button class="btn btn-dark btn-sm btn-full" id="btn-sched-add">+ Add to schedule</button>
      <div class="form-msg" id="sched-msg"></div>
    </div>
  </div>`;
}


function hostHTML(){
  if(S.status==='ended') return hostEndedHTML();

  const parts=S.participants||[];
  const sorted=[...parts].sort((a,b)=>(b.score||0)-(a.score||0));
  const isLive=S.status==='question'||S.status==='revealed';
  const isRevealed=S.status==='revealed';
  const answered=S.totalAnswered||0;
  const medals=['🥇','🥈','🥉'];

  // ── 1. LIVE SCORE NAV ──────────────────────────────────────────────────
  const scoreChips=sorted.slice(0,7).map((p,i)=>
    `<div class="sb-chip">${medals[i]||'#'+(i+1)} ${esc(p.name.split(' ')[0])} <span class="sb-pts">${p.score||0}</span></div>`
  ).join('');
  const liveNav=`
    <div class="host-live-nav">
      <button class="btn btn-ghost btn-sm" id="btn-host-home" style="flex-shrink:0;padding:4px 8px;font-size:.75rem">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:3px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Home
      </button>
      <div style="flex:1;min-width:0;overflow:hidden;display:flex;align-items:center;gap:5px;overflow-x:auto;scrollbar-width:none">
        ${parts.length?scoreChips:`<span class="muted small" style="white-space:nowrap">No students yet</span>`}
      </div>
      <button class="btn btn-ghost btn-sm" id="btn-sched-nav" style="flex-shrink:0;padding:4px 8px;gap:4px;font-size:.75rem">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Sched
      </button>
      <div style="flex-shrink:0;font-size:.75rem;font-weight:600;color:var(--mid);white-space:nowrap;padding-left:4px">${isLive?`${answered}/${parts.length}`:`${parts.length} joined`}</div>
    </div>`;

  // SVG icons — refined set
  const iconNew=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>`;
  const iconPlay=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/></svg>`;
  const iconStop=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
  const iconReset=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>`;
  const ctrlBar=`
    <div class="host-ctrl-bar">
      <button class="btn btn-sm" style="flex:1;justify-content:center;background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;gap:5px" id="btn-reload">${iconNew} New</button>
      ${!S.sessionOpen
        ?`<button class="btn btn-sm" style="flex:1;justify-content:center;background:#f0fdf4;color:#15803d;border-color:#bbf7d0;gap:5px" id="btn-open-session">${iconPlay} Start</button>`
        :`<button class="btn btn-sm" style="flex:1;justify-content:center;background:#f0fdf4;color:#15803d;border-color:#bbf7d0;gap:5px;opacity:.35;cursor:default" disabled>${iconPlay} Start</button>`}
      <button class="btn btn-sm" style="flex:1;justify-content:center;background:#fff1f2;color:#be123c;border-color:#fecdd3;gap:5px" id="btn-halt">${iconStop} Halt</button>
      <button class="btn btn-sm" style="flex:1;justify-content:center;background:var(--faint);color:var(--mid);border-color:var(--line);gap:5px" id="btn-reset">${iconReset} Reset</button>
    </div>`;

  // ── 3. STUDENTS PANEL ────────────────────────────────────────────────
  function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
  const studentRows=sorted.length
    ?sorted.map((p,i)=>{
        const ans=S.answers?.[p.id];
        const ansStr=ans!==undefined&&ans!==null?'ABCD'[ans]:'—';
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--line);font-size:.83rem">
          <div style="min-width:22px;text-align:center;font-size:.72rem;color:var(--mid)">${medals[i]||('#'+(i+1))}</div>
          <div class="j-av" style="flex-shrink:0">${initials(p.name)}</div>
          <div style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(p.name)}</div>
          <div style="font-size:.75rem;color:var(--mid);min-width:18px;text-align:center">${ansStr}</div>
          <div style="font-weight:600;min-width:44px;text-align:right">${p.score||0} <span style="font-size:.68rem;color:var(--mid)">pts</span></div>
        </div>`;
      }).join('')
    :`<div style="padding:20px;text-align:center;color:var(--mid);font-size:.83rem">Waiting for students to join…</div>`;

  const studentsPanel=`
    <div class="host-students-panel">
      <div class="host-students-head">
        <h3 style="margin:0">Students${parts.length?' ('+parts.length+')':''}</h3>
        ${isLive
          ?`<span class="small muted">${answered}/${parts.length} answered</span>`
          :S.sessionOpen
            ?`<span class="tag tag-green"><span class="dot-live"></span> Open</span>`
            :`<span class="small muted">Session not started</span>`}
      </div>
      <div class="host-students-inner">${studentRows}</div>
    </div>`;

  // ── 4. BOTTOM CONTROLS ───────────────────────────────────────────────

  // No questions loaded → show upload/generate panel
  if(!questions.length){
    const subjectRows=subjects.map(s=>`
      <div class="subject-row">
        <div><div class="subject-name">${esc(s.name)}</div></div>
        <span class="subject-count">questions:</span>
        <input class="q-count-input" type="number" min="0" max="50" value="${s.count}" data-subj="${esc(s.name)}" id="cnt-${esc(s.name)}"/>
      </div>`).join('');
    const folderOptions=uploadSubjects.map(f=>`<option value="${esc(f.name)}"${manageFolder===f.name?' selected':''}>${esc(f.name)}</option>`).join('');
    const managePanel=`
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
        <select class="form-input" id="manage-folder-sel" style="flex:1;font-size:.83rem;padding:7px 10px">
          <option value="">— select folder —</option>${folderOptions}
        </select>
        <button class="btn btn-dark btn-sm" id="btn-folder-open">Open</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <input class="form-input" id="new-folder-name" placeholder="New folder name" maxlength="40" style="flex:1;font-size:.83rem;padding:7px 10px"/>
        <button class="btn btn-accent btn-sm" id="btn-create-folder">+ Create</button>
      </div>
      ${manageFolder?`
        <div style="background:var(--faint);border:1px solid var(--line);border-radius:var(--r);padding:10px;margin-bottom:10px">
          <div style="font-size:.78rem;font-weight:600;margin-bottom:8px;color:var(--mid)">📁 ${esc(manageFolder)} / questions.txt</div>
          <textarea id="q-editor" rows="8" class="form-input" style="width:100%;font-family:monospace;font-size:.78rem;resize:vertical;padding:8px">${esc(editingContent)}</textarea>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
            <button class="btn btn-good btn-sm" id="btn-save-editor">💾 Save to GitHub</button>
            <label class="btn btn-white btn-sm" style="cursor:pointer">📂 Upload .txt<input type="file" id="file-upload-inp" accept=".txt" style="display:none"/></label>
            <button class="btn btn-ghost btn-sm" id="btn-close-editor">✕ Close</button>
          </div>
        </div>`
      :'<p class="muted small" style="margin-top:4px">Select a folder and click Open to view/edit its questions.txt.</p>'}
      <div id="upload-msg">${uploadMsg}</div>`;

    const generatePanel=`
      <p class="muted small mb2">Pick subjects from your GitHub repository and generate a quiz.</p>
      ${subjects.length?`
        <div style="margin-bottom:10px;display:flex;gap:8px;align-items:center">
          <button class="btn btn-white btn-sm" id="btn-browse">${repoLoading?'⏳ Loading…':'↻ Refresh'}</button>
          <span class="muted small">${subjects.length} subject${subjects.length!==1?'s':''}</span>
        </div>
        <div class="timer-input-row">
          <span class="muted small" style="flex:1">⏱ Timer per question</span>
          <input type="number" min="0" max="300" value="${hostTimerSeconds}" id="timer-sec-input" class="q-count-input" style="width:70px"/>
          <span class="muted small">sec</span>
        </div>
        <div class="subject-list">${subjectRows}</div>
        <div id="gen-msg"></div>
        <button class="btn btn-accent btn-full mt2" id="btn-gen">Generate quiz →</button>
      `:`
        <div id="repo-msg"></div>
        <button class="btn btn-dark btn-sm" id="btn-browse" style="margin-top:8px">${repoLoading?'⏳ Loading…':'Load subjects from GitHub →'}</button>
      `}`;

    return `<div class="host-full" style="position:relative">
      ${liveNav}
      ${ctrlBar}
      ${studentsPanel}
      <div class="host-bottom">
        <div style="display:flex;gap:0;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;flex-shrink:0">
          <button class="btn${uploadTab==='generate'?' btn-dark':' btn-ghost'}" style="flex:1;border-radius:0;border:none" id="tab-generate">📋 Generate</button>
          <button class="btn${uploadTab==='manage'?' btn-dark':' btn-ghost'}" style="flex:1;border-radius:0;border:none;border-left:1px solid var(--line)" id="tab-manage">📂 Upload</button>
        </div>
        <div class="host-bottom-scroll">${uploadTab==='generate'?generatePanel:managePanel}</div>
      </div>
      ${schedOverlayHTML()}
    </div>`;
  }

  // Questions loaded — build controller
  const q=selIdx>=0?questions[selIdx]:(isLive?S.question:null);

  // Question navigation bar
  const qNav=`<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
    ${selIdx>0?`<button class="btn btn-ghost btn-sm" style="padding:3px 10px" id="btn-q-prev">‹</button>`:'<span style="width:32px"></span>'}
    <span class="muted small" style="flex:1;text-align:center">Q${selIdx>=0?selIdx+1:'?'}/${questions.length}${q&&q.subject?' · '+esc(q.subject):''}</span>
    ${selIdx<questions.length-1?`<button class="btn btn-ghost btn-sm" style="padding:3px 10px" id="btn-q-next">›</button>`:'<span style="width:32px"></span>'}
  </div>`;

  // Timer row — shows input when idle, live countdown when question is live
  const timerTotal=S.timerSeconds||hostTimerSeconds;
  const timerLeft=timerTotal&&S.questionPushedAt&&isLive
    ?Math.max(0,timerTotal-(Date.now()-S.questionPushedAt)/1000)
    :null;
  const timerRow=`
    <div class="timer-input-row" style="flex-shrink:0">
      <span style="flex:1;font-size:.8rem;color:var(--mid)">⏱ Timer per question</span>
      ${isLive&&timerLeft!==null
        ?`<div style="display:flex;align-items:center;gap:8px">
            <div style="width:80px;height:6px;background:var(--line);border-radius:3px;overflow:hidden">
              <div id="host-timer-bar" style="height:100%;background:${timerLeft<timerTotal*0.25?'var(--bad)':'var(--accent)'};border-radius:3px;width:${timerTotal?((timerLeft/timerTotal)*100).toFixed(1):0}%;transition:width .5s linear"></div>
            </div>
            <span id="host-timer-digits" style="font-size:.85rem;font-weight:700;color:${timerLeft<timerTotal*0.25?'var(--bad)':'var(--ink)'};min-width:28px;text-align:right">${Math.ceil(timerLeft)}s</span>
          </div>`
        :`<input type="number" min="0" max="300" value="${hostTimerSeconds}" id="timer-sec-live" class="q-count-input" style="width:60px"/>
           <span class="muted small">sec</span>`}
    </div>`;

  // Question text
  const qInfo=q?`<p style="font-size:.83rem;line-height:1.4;flex-shrink:0;color:var(--ink)">${esc(q.text.length>130?q.text.slice(0,128)+'…':q.text)}</p>`
    :`<p class="muted small" style="flex-shrink:0">Select a question above or use ‹ › to navigate.</p>`;

  // Live response bars (shown when live instead of key)
  let liveBars='';
  if(isLive&&q){
    const counts=S.answerCounts||[], total=Math.max(1,counts.reduce((a,b)=>a+b,0));
    liveBars=q.options.map((o,i)=>{
      const cnt=counts[i]||0,pct=(cnt/total*100).toFixed(0);
      return `<div class="bar-row">
        <div class="bar-meta"><span>${'ABCD'[i]}) ${esc(o)}${S.correct===i?' ✓':''}</span><span>${cnt}</span></div>
        <div class="bar-track"><div class="bar-fill${S.correct===i?' correct':''}" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  }

  // Answer key (shown when not live)
  const keyGrid=(!isLive&&q)?`
    <div class="key-grid" style="flex-shrink:0">
      ${q.options.map((o,i)=>`
        <div class="key-card${answerKey===i?' selected':''}" data-key="${i}">
          <div class="kl">${'ABCD'[i]}</div><div class="kt">${esc(o)}</div>
        </div>`).join('')}
    </div>`:'';

  // Mic/music state
  const micOn=!!localStream;

  // SVG action icons — refined
  const iconSend=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9" fill="currentColor" stroke="none"/></svg>`;
  const iconEye=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const iconNext=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>`;
  const iconMicOn=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
  const iconMicOff=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;

  // Action buttons — no margin-top:auto (space goes below, not above)
  const actionBtns=`
    <div style="display:flex;gap:6px;flex-shrink:0;padding-top:8px;border-top:1px solid var(--line);margin-top:4px">
      <button class="btn btn-lg" style="flex:1;font-size:.78rem;padding:10px 4px;gap:5px;background:#1e293b;color:#fff;border-color:#1e293b;justify-content:center" id="btn-push"
        ${(!q||answerKey<0||pushing||isLive)?'disabled':''}>${iconSend}${pushing?'Sending…':'Push'}</button>
      <button class="btn btn-lg" style="flex:1;font-size:.78rem;padding:10px 4px;gap:5px;background:#f59e0b;color:#fff;border-color:#f59e0b;justify-content:center" id="btn-reveal"
        ${(!isLive||isRevealed)?'disabled':''}>${iconEye} Reveal</button>
      <button class="btn btn-lg" style="flex:1;font-size:.78rem;padding:10px 4px;gap:5px;background:#0ea5e9;color:#fff;border-color:#0ea5e9;justify-content:center" id="btn-next"
        ${!isRevealed?'disabled':''}>${iconNext} Next</button>
      <button class="btn btn-lg" style="padding:10px 12px;flex-shrink:0;justify-content:center;${micOn?'background:#fee2e2;color:#be123c;border-color:#fecaca':'background:var(--faint);color:var(--mid);border-color:var(--line)'}"
        id="${micOn?'btn-mic-stop':'btn-mic-start'}" title="${micOn?'Stop mic':'Start mic'}">${micOn?iconMicOff:iconMicOn}</button>
    </div>`;

  return `<div class="host-full" style="position:relative">
    ${liveNav}
    ${ctrlBar}
    ${studentsPanel}
    <div class="host-bottom">
      ${qNav}
      ${timerRow}
      ${qInfo}
      ${isLive
        ?`<div style="overflow-y:auto;flex:1">${liveBars}</div>`
        :`${keyGrid}`}
      ${actionBtns}
      <div style="flex:1;min-height:0"></div>
    </div>
    ${schedOverlayHTML()}
  </div>`;
}


/* ══════════════════════════════════════

function hostEndedHTML(){
  const history=S.history||[], parts=S.participants||[];
  const sorted=[...parts].sort((a,b)=>(b.score||0)-(a.score||0));
  const partMap={}; parts.forEach(p=>partMap[p.id]=p);
  const table=parts.length&&history.length?`<div class="itbl-wrap"><table class="itbl">
    <thead><tr><th>Student</th>${history.map((_,i)=>`<th>Q${i+1}</th>`).join('')}<th>Score</th></tr></thead>
    <tbody>${sorted.map(p=>`<tr data-pid="${p.id}"><td><strong>${esc(p.name)}</strong></td>
      ${history.map(h=>{const ans=h.answers[p.id]??null;if(ans===null)return'<td class="c-nil">—</td>';return`<td class="${ans===h.correct?'c-ok':'c-bad'}">${'ABCD'[ans]}${ans===h.correct?' ✓':' ✗'}</td>`;}).join('')}
      <td><strong>${p.score||0}</strong></td></tr>`).join('')}</tbody>
  </table></div>`:'<div class="notice n-neutral">No data recorded.</div>';
  let detail='';
  if(inspectPid&&partMap[inspectPid]){
    const p=partMap[inspectPid];
    detail=`<div class="detail-wrap"><div class="detail-head"><span><strong>${esc(p.name)}</strong> — ${p.score||0} pts</span><button class="btn btn-ghost btn-sm" id="btn-close-inspect">Close</button></div>
      ${history.map((h,i)=>{const ans=h.answers[p.id]??null;return`<div class="detail-row"><div class="detail-q">Q${i+1}: ${esc(h.question.text)}</div>
        <div class="ans-chips">${h.question.options.map((o,oi)=>{let cls='ac-none';if(oi===h.correct)cls='ac-good';if(ans===oi&&oi!==h.correct)cls='ac-bad';const mark=oi===ans?(oi===h.correct?' ✓':' ✗'):'';
          return`<span class="ans-chip ${cls}" style="${oi===ans||oi===h.correct?'font-weight:600':''}">${'ABCD'[oi]}) ${esc(o)}${mark}</span>`;}).join('')}${ans===null?'<span class="ans-chip ac-none">No answer</span>':''}</div></div>`;}).join('')}
    </div>`;
  }
  return `<div class="wide" style="padding:16px">
    <div class="results-header">
      <h2>Results</h2>
      <div class="results-btns">
        <button class="btn btn-good btn-sm" id="btn-continue-session">▶ Continue</button>
        <button class="btn btn-warn btn-sm" id="btn-halt">⏹ Halt &amp; Dismiss</button>
        <button class="btn btn-ghost btn-sm" id="btn-reset">↺ Reset</button>
      </div>
    </div>
    <div class="notice n-neutral mb3" style="font-size:.79rem">
      <strong>Continue</strong> — return to waiting room &nbsp;·&nbsp; <strong>Halt</strong> — send students home
    </div>
    <p class="muted small mb2">Tap any row to inspect answers.</p>${table}${detail}</div>`;
}

function participantHTML(){
  // Gate: if session not open and not yet joined, show no-session screen
  if(!S.sessionOpen&&!myName) return noSessionHTML();
  if(!myName)            return joinHTML();
  if(S.status==='idle')  return waitHTML();
  if(S.status==='ended') return studentEndHTML();
  return questionViewHTML();
}

function noSessionHTML(){
  const scheds=serverSchedules;
  const next=scheds&&scheds.length?scheds[0]:null;
  return `<div class="center"><div class="box" style="text-align:center">
    <div style="font-size:2.5rem;margin-bottom:16px">📚</div>

function waitHTML(){
  const parts=S.participants||[];
  const myP=parts.find(p=>p.id===myPid);
  function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
  const chips=[...(myP?[myP]:[]),...parts.filter(p=>p.id!==myPid)].map(p=>`
    <div class="student-chip"><div class="s-av" style="${p.id===myPid?'background:#d8f3dc;border-color:#b7dfc7':''}">${initials(p.name)}</div>
    <span>${esc(p.name)}${p.id===myPid?' <span style="font-size:.7rem;color:var(--mid)">(you)</span>':''}</span></div>`).join('');
  const history=S.myHistory||[];
  const waitMsg=history.length?'Wait for next question…':'Waiting for host to start…';
  const lbHTML=history.length?`<div class="lb-panel">
    <div class="lb-head"><span style="font-size:.82rem;font-weight:600">🏆 Leaderboard</span><span class="small muted">${parts.length} students</span></div>
    ${[...parts].sort((a,b)=>(b.score||0)-(a.score||0)).map((p,i)=>`
      <div class="lb-row${p.id===myPid?' me':''}">
        <div class="score-rank">${['🥇','🥈','🥉'][i]||i+1}</div>
        <div style="flex:1">${esc(p.name)}${p.id===myPid?' <span style="font-size:.7rem;color:var(--mid)">← you</span>':''}</div>
        <div class="score-pts">${p.score||0}${p.id===myPid&&scoreGain>0?'<span style="color:#22c55e;font-size:.74rem;font-weight:700;margin-left:5px">+'+scoreGain+'</span>':''}</div>
      </div>`).join('')}
  </div>`:'';
  return `<div class="wait-shell">
    <div class="wait-header">
      <div class="spinner"></div>
      <h2>${waitMsg}</h2>
      <p class="muted mt1">${parts.length} student${parts.length!==1?'s':''} in the room</p>
    </div>
    <div class="voice-bar" style="max-width:480px;width:100%;margin-bottom:16px">
      <div id="mic-dot" class="mic-dot"></div>
      <span style="flex:1;color:var(--mid);font-size:.8rem">Host voice</span>
    </div>
    <div class="student-grid" style="max-width:560px;margin-bottom:8px">${chips}</div>
    ${lbHTML}
    <button class="btn btn-ghost btn-sm mt3" id="btn-leave">Leave session</button>
  </div>`;
}

function questionViewHTML(){
  const q=S.question; if(!q) return waitHTML();
  const answered=S.myAnswer!==null&&S.myAnswer!==undefined;
  const revealed=S.status==='revealed', correct=S.correct;
  const opts=q.options.map((o,i)=>{
    let cls='opt-card';
    if(revealed){cls+=' locked';if(i===correct)cls+=' correct';else if(i===S.myAnswer)cls+=' wrong';}
    else if(answered){cls+=' locked';if(i===S.myAnswer)cls+=' chosen';}
    else if(i===S.myAnswer) cls+=' chosen';
    return `<div class="${cls}" data-opt="${i}"><div class="opt-key">${'ABCD'[i]}</div><span>${esc(o)}</span></div>`;
  }).join('');
  let notice='';
  if(revealed&&answered){ const ok=S.myAnswer===correct; notice=`<div class="notice ${ok?'n-good':'n-bad'} mt3">${ok?'✓ Correct — +1 point':`✗ Wrong. Correct: ${esc(q.options[correct])}`}</div>`; }
  else if(answered&&!revealed){ notice=`<div class="notice n-neutral mt3">Answer submitted — waiting for reveal.</div>`; }
  const hasTimer=S.timerSeconds&&S.status==='question';
  return `${scoreBannerHTML()}<div class="page">
    <div class="row between mb2">
      <div class="row gap2"><div id="mic-dot" class="mic-dot"></div><span class="small muted">Score: <strong>${S.myScore||0}</strong> pts</span></div>
      <button class="btn btn-ghost btn-sm" id="btn-leave">Leave</button>
    </div>
    ${hasTimer?`<div class="timer-wrap"><div class="timer-bar-track"><div id="timer-bar" class="timer-bar-fill" style="width:100%"></div></div><div id="timer-digits" class="timer-digits">${S.timerSeconds}s</div></div>`:''}
    <h2 class="mb3">${esc(q.text)}</h2>
    <div class="opt-grid">${opts}</div>
    ${notice}
  </div>`;
}

function studentEndHTML(){
  const sorted=[...(S.participants||[])].sort((a,b)=>(b.score||0)-(a.score||0));
  const myRank=sorted.findIndex(p=>p.id===myPid)+1;
  const medals=['🥇','🥈','🥉'];
  return `<div class="page">
    <h1 class="mb1">Session ended</h1>
    <p class="muted mb2">You finished <strong>#${myRank}</strong> of ${sorted.length}</p>
    <div class="notice n-neutral mb4" style="font-size:.82rem">The host may continue the session or close it. Please wait…</div>
    <h3 class="mb2">Leaderboard</h3>
    <div class="score-list">
      ${sorted.map((p,i)=>`<div class="score-row${p.id===myPid?' me':i<3?' top':''}">
        <div class="score-rank">${medals[i]||i+1}</div>
        <div class="score-name">${esc(p.name)}${p.id===myPid?' <span style="font-size:.7rem;color:var(--mid)">← you</span>':''}</div>
        <div class="score-pts">${p.score||0}</div>
      </div>`).join('')}
    </div>
  </div>`;
}
