<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizZap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f9f8f6;
      --white:   #ffffff;
      --ink:     #111110;
      --mid:     #6b6b66;
      --line:    #e4e3df;
      --accent:  #1a1a18;
      --good:    #2d6a4f;
      --bad:     #c1121f;
      --good-bg: #d8f3dc;
      --bad-bg:  #ffe0e0;
      --serif:   'DM Serif Display', Georgia, serif;
      --sans:    'DM Sans', system-ui, sans-serif;
      --r:       6px;
    }

    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 52px;
      border-bottom: 1px solid var(--line);
      background: var(--white);
    }
    .brand {
      font-family: var(--serif);
      font-size: 1.25rem;
      letter-spacing: -.01em;
      color: var(--ink);
    }
    .nav-right { display: flex; align-items: center; gap: 10px; font-size: .8rem; color: var(--mid); }
    #conn-indicator { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
    #conn-indicator.on  { background: #2d9e6b; }
    #conn-indicator.off { background: #c1121f; }

    main { flex: 1; display: flex; }
    #view { flex: 1; }

    /* ── TYPOGRAPHY ── */
    h1 { font-family: var(--serif); font-size: 2.2rem; font-weight: 400; line-height: 1.15; }
    h2 { font-family: var(--serif); font-size: 1.5rem; font-weight: 400; line-height: 1.2; }
    h3 { font-size: .7rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--mid); }

    /* ── CENTERING WRAPPERS ── */
    .center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 52px); padding: 32px 20px; }
    .box { background: var(--white); border: 1px solid var(--line); border-radius: var(--r); padding: 36px; width: 100%; max-width: 440px; }
    .page { width: 100%; max-width: 700px; margin: 0 auto; padding: 36px 20px; }
    .page-wide { width: 100%; max-width: 900px; margin: 0 auto; padding: 36px 20px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-family: var(--sans); font-size: .84rem; font-weight: 500;
      padding: 9px 20px; border-radius: var(--r);
      border: 1px solid transparent; cursor: pointer;
      transition: opacity .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .38; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: .88; }
    .btn-dark  { background: var(--ink); color: #fff; border-color: var(--ink); }
    .btn-white { background: var(--white); color: var(--ink); border-color: var(--line); }
    .btn-white:hover { border-color: #aaa !important; }
    .btn-ghost { background: transparent; color: var(--mid); border-color: var(--line); }
    .btn-good  { background: var(--good); color: #fff; }
    .btn-bad   { background: var(--bad);  color: #fff; }
    .btn-sm    { padding: 6px 14px; font-size: .78rem; }
    .btn-lg    { padding: 12px 28px; font-size: .92rem; }
    .btn-full  { width: 100%; }

    /* ── INPUTS ── */
    input[type="text"], input[type="url"] {
      width: 100%; padding: 9px 12px;
      font-family: var(--sans); font-size: .88rem;
      background: var(--white); color: var(--ink);
      border: 1px solid var(--line); border-radius: var(--r);
      outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #999; }
    input::placeholder { color: #bbb; }

    /* ── TAGS / CHIPS ── */
    .tag { display: inline-flex; align-items: center; gap: 5px; padding: 2px 10px; border-radius: 20px; font-size: .72rem; font-weight: 500; }
    .tag-green  { background: var(--good-bg); color: var(--good); }
    .tag-red    { background: var(--bad-bg);  color: var(--bad); }
    .tag-ink    { background: #e8e8e6; color: var(--ink); }
    .dot-live   { width: 6px; height: 6px; border-radius: 50%; background: #2d9e6b; animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── DIVIDER ── */
    hr { border: none; border-top: 1px solid var(--line); margin: 24px 0; }

    /* ── SPACING UTILS ── */
    .mt1 { margin-top: 6px; }  .mt2 { margin-top: 12px; } .mt3 { margin-top: 20px; } .mt4 { margin-top: 32px; }
    .mb1 { margin-bottom: 6px; } .mb2 { margin-bottom: 12px; } .mb3 { margin-bottom: 20px; }
    .gap2 { gap: 8px; } .gap3 { gap: 12px; }
    .row  { display: flex; align-items: center; }
    .col  { display: flex; flex-direction: column; }
    .between { justify-content: space-between; }
    .wrap { flex-wrap: wrap; }
    .muted { color: var(--mid); font-size: .84rem; }
    .small { font-size: .78rem; }

    /* ── QUESTION LIST (HOST) ── */
    .q-list { border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
    .q-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background .12s;
      background: var(--white);
    }
    .q-item:last-child { border-bottom: none; }
    .q-item:hover { background: #f4f3f0; }
    .q-item.active { background: #f0efec; }
    .q-num { font-size: .72rem; font-weight: 600; color: var(--mid); padding-top: 2px; min-width: 22px; }
    .q-body { flex: 1; }
    .q-text { font-size: .9rem; line-height: 1.4; }
    .q-opts-preview { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
    .opt-pill { font-size: .7rem; color: var(--mid); background: #f0efec; border-radius: 4px; padding: 1px 7px; }

    /* ── ANSWER KEY SELECTOR ── */
    .key-row { display: flex; gap: 8px; }
    .key-btn {
      flex: 1; padding: 10px 0; text-align: center;
      font-size: .82rem; font-weight: 600;
      border: 1px solid var(--line); border-radius: var(--r);
      background: var(--white); cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .key-btn:hover { background: #f4f3f0; }
    .key-btn.selected { background: var(--ink); color: #fff; border-color: var(--ink); }

    /* ── ANSWER BARS (HOST LIVE) ── */
    .bar-row { margin-bottom: 10px; }
    .bar-meta { display: flex; justify-content: space-between; font-size: .78rem; color: var(--mid); margin-bottom: 3px; }
    .bar-track { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
    .bar-fill  { height: 100%; background: var(--ink); border-radius: 3px; transition: width .4s ease; }
    .bar-fill.correct { background: var(--good); }

    /* ── PARTICIPANT OPTION CARDS ── */
    .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .opt-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--line); border-radius: var(--r);
      cursor: pointer; background: var(--white);
      transition: border-color .15s, background .15s;
      font-size: .88rem;
    }
    .opt-card:not(.locked):hover { border-color: #999; background: #fafaf8; }
    .opt-card.chosen { border-color: var(--ink); background: #f0efec; }
    .opt-card.correct { border-color: var(--good); background: var(--good-bg); }
    .opt-card.wrong   { opacity: .45; }
    .opt-card.locked  { cursor: default; }
    .opt-key {
      width: 26px; height: 26px; flex-shrink: 0;
      border-radius: 4px; background: var(--line);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 600;
    }
    .opt-card.chosen  .opt-key { background: var(--ink);  color: #fff; }
    .opt-card.correct .opt-key { background: var(--good); color: #fff; }

    /* ── SCOREBOARD ── */
    .score-list { border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
    .score-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--white); font-size: .88rem; }
    .score-row:last-child { border-bottom: none; }
    .score-rank { min-width: 24px; text-align: center; font-size: .78rem; color: var(--mid); }
    .score-name { flex: 1; }
    .score-pts  { font-weight: 600; }

    /* ── NOTICE STRIP ── */
    .notice { padding: 12px 16px; border-radius: var(--r); font-size: .84rem; }
    .notice-good { background: var(--good-bg); color: var(--good); }
    .notice-bad  { background: var(--bad-bg);  color: var(--bad); }
    .notice-neutral { background: #f0efec; color: var(--ink); }

    /* ── WAITING RING ── */
    .waiting-ring {
      width: 48px; height: 48px; border: 3px solid var(--line);
      border-top-color: var(--ink); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .opt-grid { grid-template-columns: 1fr; }
      h1 { font-size: 1.8rem; }
      .box { padding: 24px; }
    }
  </style>
</head>
<body>
<div id="app">
  <nav>
    <span class="brand">QuizZap</span>
    <div class="nav-right">
      <div id="conn-indicator"></div>
      <span id="conn-label">connecting</span>
      <span id="nav-role" style="display:none"></span>
    </div>
  </nav>
  <main><div id="view"></div></main>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════════════════════════ */
let S = {};
let role    = null;   // 'host' | 'participant'
let myPid   = null;
let myName  = null;

// Host-only local state
let questions = [];   // parsed from GitHub file
let selIdx    = -1;   // selected question index
let answerKey = -1;   // 0-3

/* ═══════════════════════════════════════════════════════════════════
   WEBSOCKET
═══════════════════════════════════════════════════════════════════ */
let ws;
const WS = `${location.protocol==='https:'?'wss':'ws'}://${location.host}`;
const ci  = document.getElementById('conn-indicator');
const cl  = document.getElementById('conn-label');

function connect() {
  ws = new WebSocket(WS);
  ws.onopen = () => {
    ci.className = 'on'; cl.textContent = 'connected';
    if (role === 'host') send({ type: 'set_host' });
    else if (role === 'participant' && myName) send({ type: 'join', name: myName, pid: myPid });
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'state')  { S = msg.payload; render(); }
    if (msg.type === 'joined') { myPid = msg.pid; sessionStorage.setItem('qz_pid', msg.pid); }
  };
  ws.onclose = () => { ci.className = 'off'; cl.textContent = 'reconnecting…'; setTimeout(connect, 2000); };
  ws.onerror = () => ws.close();
}

function send(data) {
  if (ws?.readyState === 1) ws.send(JSON.stringify(data));
}

/* ═══════════════════════════════════════════════════════════════════
   QUESTION FILE PARSER
   Supports format:
   What is 2+2?
   A) 3
   B) 4
   C) 5
   D) 6

   (blank line between questions)
═══════════════════════════════════════════════════════════════════ */
function parseQuestions(text) {
  const blocks = text.trim().split(/\n{2,}/);
  const out = [];
  for (const block of blocks) {
    const lines = block.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 5) continue; // need question + 4 options
    const optLines = lines.slice(-4);
    const textLines = lines.slice(0, -4);
    // check last 4 lines look like options (start with A-D, optional ) or .  or :)
    const optRe = /^[A-Da-d][).\-:\s]/;
    if (!optLines.every(l => optRe.test(l))) continue;
    const qText = textLines.join(' ').replace(/^\d+[.)]\s*/, '').trim();
    const opts  = optLines.map(l => l.replace(/^[A-Da-d][).\-:\s]+/, '').trim());
    if (qText) out.push({ text: qText, options: opts });
  }
  return out;
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER ROUTER
═══════════════════════════════════════════════════════════════════ */
function render() {
  const el = document.getElementById('nav-role');
  if (role === 'host')        { el.style.display=''; el.textContent='Host'; }
  else if (myName)            { el.style.display=''; el.textContent=myName; }
  else                        { el.style.display='none'; }

  const v = document.getElementById('view');
  if (!role)              v.innerHTML = landingHTML();
  else if (role==='host') v.innerHTML = hostHTML();
  else                    v.innerHTML = participantHTML();
  attach();
}

/* ═══════════════════════════════════════════════════════════════════
   LANDING
═══════════════════════════════════════════════════════════════════ */
function landingHTML() {
  const count = (S.participants||[]).length;
  return `
  <div class="center">
    <div class="box">
      <h1 class="mb2">Live Quiz</h1>
      <p class="muted mb3">Real-time Q&amp;A for classrooms and events.</p>
      <div class="col gap3">
        <button class="btn btn-dark btn-lg" id="go-host">Host a session</button>
        <button class="btn btn-white btn-lg" id="go-join">Join as student</button>
      </div>
      ${count > 0 ? `<p class="muted small mt3 text-center">${count} student${count!==1?'s':''} currently connected</p>` : ''}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   HOST VIEW
═══════════════════════════════════════════════════════════════════ */
function hostHTML() {
  return `<div class="page-wide">${hostPanels()}</div>`;
}

function hostPanels() {
  const left  = leftPanel();
  const right = rightPanel();
  return `
  <div style="display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start">
    <div>${left}</div>
    <div>${right}</div>
  </div>
  <style>
    @media(max-width:720px){
      div[style*="grid-template-columns"]{grid-template-columns:1fr!important}
    }
  </style>`;
}

/* Left: question loader + list */
function leftPanel() {
  const loaded = questions.length > 0;

  const listHTML = loaded ? `
    <div class="mt3">
      <h3 class="mb2">${questions.length} questions loaded</h3>
      <div class="q-list">
        ${questions.map((q,i) => `
          <div class="q-item${selIdx===i?' active':''}" data-qi="${i}">
            <div class="q-num">${i+1}</div>
            <div class="q-body">
              <div class="q-text">${esc(q.text)}</div>
              <div class="q-opts-preview">
                ${q.options.map((o,oi)=>`<span class="opt-pill">${'ABCD'[oi]}) ${esc(o)}</span>`).join('')}
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>` : '';

  return `
  <div>
    <div class="row between mb3">
      <h2>Questions</h2>
      <button class="btn btn-ghost btn-sm" id="btn-reset">Reset session</button>
    </div>

    <h3 class="mb1">Load from GitHub</h3>
    <p class="muted small mb2">Paste the raw file URL (raw.githubusercontent.com/…)</p>
    <div class="row gap2">
      <input type="url" id="gh-url" placeholder="https://raw.githubusercontent.com/…/questions.txt" />
      <button class="btn btn-dark btn-sm" id="btn-load" style="flex-shrink:0">Load</button>
    </div>
    <p class="muted small mt1">
      File format: question text, then A) … B) … C) … D) … — blank line between questions.
    </p>
    <div id="load-msg"></div>
    ${listHTML}
  </div>`;
}

/* Right: push panel + live status */
function rightPanel() {
  const q = selIdx >= 0 ? questions[selIdx] : null;

  // Push panel
  const pushPanel = q ? `
    <div style="border:1px solid var(--line);border-radius:var(--r);overflow:hidden">
      <div style="padding:14px 16px;border-bottom:1px solid var(--line);background:#fafaf8">
        <h3 class="mb1">Selected — Q${selIdx+1}</h3>
        <p style="font-size:.88rem;line-height:1.4">${esc(q.text)}</p>
      </div>
      <div style="padding:14px 16px">
        <h3 class="mb2">Set answer key</h3>
        <div class="key-row mb3">
          ${q.options.map((o,i)=>`
            <div class="key-btn${answerKey===i?' selected':''}" data-key="${i}">
              ${'ABCD'[i]}
            </div>`).join('')}
        </div>
        <button class="btn btn-dark btn-full" id="btn-push"
          ${answerKey<0||S.status==='question'?'disabled':''}>
          Push to students
        </button>
      </div>
    </div>` : `
    <div class="notice notice-neutral">
      Select a question from the list to push it to students.
    </div>`;

  // Live status (shown when question is active)
  const livePanel = (S.status==='question'||S.status==='revealed') && S.question ? `
    <div style="margin-top:16px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid var(--line);background:#fafaf8;display:flex;align-items:center;justify-content:space-between">
        <div class="row gap2">
          ${S.status==='question'
            ? '<span class="tag tag-green"><span class="dot-live"></span>Live</span>'
            : '<span class="tag tag-ink">Revealed</span>'}
        </div>
        <span class="small muted">${S.totalAnswered||0} / ${(S.participants||[]).length} answered</span>
      </div>
      <div style="padding:14px 16px">
        <p style="font-size:.84rem;margin-bottom:12px;line-height:1.4">${esc(S.question.text)}</p>
        ${(S.question.options||[]).map((o,i)=>{
          const cnt = (S.answerCounts||[])[i]||0;
          const tot = (S.answerCounts||[]).reduce((a,b)=>a+b,0)||1;
          const pct = (cnt/tot*100).toFixed(0);
          const isCorrect = S.correct===i;
          return `
          <div class="bar-row">
            <div class="bar-meta">
              <span>${'ABCD'[i]}) ${esc(o)}${isCorrect?' ✓':''}</span>
              <span>${cnt}</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill${isCorrect?' correct':''}" style="width:${pct}%"></div>
            </div>
          </div>`;
        }).join('')}
        <div class="row gap2 mt3">
          ${S.status==='question'
            ? '<button class="btn btn-good btn-sm" id="btn-reveal">Reveal answer</button>'
            : ''}
          <button class="btn btn-ghost btn-sm" id="btn-clear">Clear</button>
        </div>
      </div>
    </div>` : '';

  // Scoreboard
  const sorted = [...(S.participants||[])].sort((a,b)=>(b.score||0)-(a.score||0));
  const scorePanel = sorted.length > 0 ? `
    <div style="margin-top:16px">
      <h3 class="mb2">Scoreboard</h3>
      <div class="score-list">
        ${sorted.map((p,i)=>`
          <div class="score-row">
            <div class="score-rank">${i+1}</div>
            <div class="score-name">${esc(p.name)}</div>
            <div class="score-pts">${p.score||0}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  return `${pushPanel}${livePanel}${scorePanel}`;
}

/* ═══════════════════════════════════════════════════════════════════
   PARTICIPANT VIEW
═══════════════════════════════════════════════════════════════════ */
function participantHTML() {
  if (!myName) return joinHTML();
  if (S.status === 'idle') return waitHTML();
  return questionViewHTML();
}

function joinHTML() {
  return `
  <div class="center">
    <div class="box">
      <h2 class="mb1">Join session</h2>
      <p class="muted mb3">Enter your name to participate.</p>
      <input type="text" id="name-in" placeholder="Your name" maxlength="28" autocomplete="off" />
      <button class="btn btn-dark btn-full mt2" id="btn-enter">Join →</button>
    </div>
  </div>`;
}

function waitHTML() {
  const count = (S.participants||[]).length;
  return `
  <div class="center">
    <div style="text-align:center">
      <div class="waiting-ring" style="margin:0 auto 20px"></div>
      <h2 class="mb1">Waiting for question</h2>
      <p class="muted">${count} participant${count!==1?'s':''} in the room</p>
    </div>
  </div>`;
}

function questionViewHTML() {
  const q = S.question;
  if (!q) return waitHTML();

  const answered  = S.myAnswer !== null && S.myAnswer !== undefined;
  const revealed  = S.status === 'revealed';
  const correct   = S.correct;

  const opts = q.options.map((o,i) => {
    let cls = 'opt-card';
    if (revealed) {
      cls += ' locked';
      if (i === correct)            cls += ' correct';
      else if (i === S.myAnswer)    cls += ' wrong';
    } else if (answered) {
      cls += ' locked';
      if (i === S.myAnswer) cls += ' chosen';
    } else {
      if (i === S.myAnswer) cls += ' chosen';
    }
    return `
      <div class="${cls}" data-opt="${i}">
        <div class="opt-key">${'ABCD'[i]}</div>
        <span>${esc(o)}</span>
      </div>`;
  }).join('');

  let notice = '';
  if (revealed && answered) {
    const ok = S.myAnswer === correct;
    notice = `<div class="notice ${ok?'notice-good':'notice-bad'} mt3">
      ${ok ? '✓ Correct — +100 points' : `✗ Wrong. Correct answer: ${esc(q.options[correct])}`}
    </div>`;
  } else if (answered && !revealed) {
    notice = `<div class="notice notice-neutral mt3">Answer submitted — waiting for the host to reveal.</div>`;
  }

  return `
  <div class="center" style="padding-top:20px">
    <div style="width:100%;max-width:580px;padding:0 16px">
      <p class="small muted mb2">Score: ${S.myScore||0} pts &nbsp;·&nbsp; ${(S.participants||[]).length} in room</p>
      <h2 class="mb3">${esc(q.text)}</h2>
      <div class="opt-grid">${opts}</div>
      ${notice}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   EVENT BINDING
═══════════════════════════════════════════════════════════════════ */
function attach() {
  // Landing
  on('go-host', () => { role='host'; send({type:'set_host'}); render(); });
  on('go-join', () => { role='participant'; render(); });

  // Join
  on('btn-enter', doJoin);
  const ni = document.getElementById('name-in');
  if (ni) { ni.addEventListener('keydown', e => e.key==='Enter' && doJoin()); ni.focus(); }

  // Host: load file
  on('btn-load', loadGitHub);
  const ghIn = document.getElementById('gh-url');
  if (ghIn) ghIn.addEventListener('keydown', e => e.key==='Enter' && loadGitHub());

  // Host: select question
  document.querySelectorAll('.q-item[data-qi]').forEach(el =>
    el.addEventListener('click', () => { selIdx=+el.dataset.qi; answerKey=-1; render(); })
  );

  // Host: answer key
  document.querySelectorAll('.key-btn[data-key]').forEach(el =>
    el.addEventListener('click', () => { answerKey=+el.dataset.key; render(); })
  );

  // Host: push
  on('btn-push', () => {
    if (selIdx<0 || answerKey<0) return;
    send({ type:'push_question', question: questions[selIdx], correct: answerKey });
  });

  // Host: reveal / clear / reset
  on('btn-reveal', () => send({ type:'reveal' }));
  on('btn-clear',  () => send({ type:'clear'  }));
  on('btn-reset',  () => {
    send({ type:'reset' });
    questions=[]; selIdx=-1; answerKey=-1;
    render();
  });

  // Participant: answer
  document.querySelectorAll('.opt-card[data-opt]').forEach(el =>
    el.addEventListener('click', () => {
      if (S.myAnswer!==null && S.myAnswer!==undefined) return;
      if (S.status==='revealed') return;
      send({ type:'answer', idx: +el.dataset.opt });
    })
  );
}

function on(id, fn) {
  document.getElementById(id)?.addEventListener('click', fn);
}

function doJoin() {
  const v = document.getElementById('name-in')?.value?.trim();
  if (!v) return;
  myName = v;
  myPid  = sessionStorage.getItem('qz_pid');
  send({ type:'join', name:myName, pid:myPid });
  render();
}

async function loadGitHub() {
  const url = document.getElementById('gh-url')?.value?.trim();
  const msg = document.getElementById('load-msg');
  if (!url) return;

  // Convert github.com URL to raw if needed
  let raw = url
    .replace('https://github.com/', 'https://raw.githubusercontent.com/')
    .replace('/blob/', '/');

  if (!msg) return;
  msg.innerHTML = `<p class="muted small mt1">Loading…</p>`;

  try {
    const res = await fetch(raw);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    questions = parseQuestions(text);
    if (questions.length === 0) throw new Error('No valid questions found. Check your file format.');
    selIdx = -1; answerKey = -1;
    msg.innerHTML = '';
    render();
  } catch(e) {
    msg.innerHTML = `<div class="notice notice-bad mt2">${esc(e.message)}</div>`;
  }
}

/* ═══════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════ */
connect();
render();
</script>
