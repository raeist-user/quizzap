<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Shadab Coaching Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400..700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#f5f4ef;--white:#ffffff;--ink:#0e0e12;--mid:#6e6e7a;
      --line:#e2e0da;--faint:#f0efe9;--surface:#faf9f6;
      --good:#0e7a5a;--bad:#d92b3a;--good-bg:#d4f5e8;--bad-bg:#fde8ea;
      --accent:#1a56db;--accent-bg:#eff6ff;
      --warn:#c47d00;--warn-bg:#fef3d0;
      --serif:'Fraunces',Georgia,serif;
      --sans:'Plus Jakarta Sans',system-ui,sans-serif;
      --r:12px;--r-sm:8px;--r-lg:16px;--r-xl:20px;
      --sh-xs:0 1px 3px rgba(14,14,18,.06),0 1px 2px rgba(14,14,18,.04);
      --sh-sm:0 2px 8px rgba(14,14,18,.08),0 1px 3px rgba(14,14,18,.05);
      --sh-md:0 6px 24px rgba(14,14,18,.10),0 2px 6px rgba(14,14,18,.06);
      --sh-lg:0 16px 48px rgba(14,14,18,.14),0 4px 12px rgba(14,14,18,.08);
      --t-fast:140ms cubic-bezier(.4,0,.2,1);
      --t-med:220ms cubic-bezier(.4,0,.2,1);
      --t-spring:320ms cubic-bezier(.34,1.56,.64,1);
    }

    /* KEYFRAMES */
    @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes chipIn{from{opacity:0;transform:scale(.85) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes popIn{0%{opacity:0;transform:scale(.88)}65%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
    @keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.6}}
    @keyframes barGrow{from{width:0}}
    @keyframes shimmer{from{background-position:-200% center}to{background-position:200% center}}
    @keyframes rowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
    @keyframes fastFingerIn{0%{opacity:0;transform:scale(.6) rotate(-15deg)}60%{transform:scale(1.2) rotate(4deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
    @keyframes timerUrgent{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    @keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

    /* Fastest finger badge */
    .ff-badge{display:inline-flex;align-items:center;gap:3px;font-size:.63rem;font-weight:700;letter-spacing:.04em;padding:2px 6px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#7c2d12;border-radius:10px;vertical-align:middle;animation:fastFingerIn .4s cubic-bezier(.34,1.56,.64,1) both;white-space:nowrap;flex-shrink:0}

    /* Confetti canvas */
    #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:1;transition:opacity .6s ease}
    #confetti-canvas.fade{opacity:0}

    /* Timer urgent pulse on the digit */
    .timer-digits.urgent{color:var(--bad);animation:timerUrgent .5s ease-in-out infinite}

    html,body{height:100%;scroll-behavior:smooth}
    body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    .urdu{font-family:'Noto Nastaliq Urdu',serif;direction:rtl;line-height:2.2;text-align:right;unicode-bidi:embed}

    /* NAV */
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:58px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);position:sticky;top:0;z-index:200;gap:12px;}
    .brand{font-family:var(--serif);font-size:1.12rem;flex-shrink:0;line-height:1.2;letter-spacing:-.01em}
    .brand small{display:block;font-family:var(--sans);font-size:.57rem;font-weight:700;color:var(--mid);letter-spacing:.11em;text-transform:uppercase;margin-top:1px}
    .nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    #ci{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background var(--t-med)}
    #ci.on{background:#16a34a}
    #ci.off{background:var(--bad);animation:blink 1s ease-in-out infinite}
    #conn-lbl{font-size:.72rem;color:var(--mid);font-weight:500}

    /* NAV BACK */
    .nav-back{display:flex;align-items:center;gap:5px;font-size:.79rem;font-weight:600;color:var(--mid);cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);border:1.5px solid var(--line);background:var(--white);white-space:nowrap;flex-shrink:0;transition:all var(--t-fast)}
    .nav-back:hover{background:var(--faint);border-color:#bbb;transform:translateX(-1px)}
    .nav-back:active{transform:scale(.97)}

    /* PROFILE */
    .profile-wrap{position:relative}
    .profile-btn{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 12px;border-radius:24px;border:1.5px solid var(--line);background:var(--white);font-size:.82rem;font-weight:600;transition:all var(--t-fast);user-select:none;-webkit-user-select:none}
    .profile-btn:hover{background:var(--faint);border-color:#bbb}
    .p-avatar{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;letter-spacing:.01em}
    .p-dropdown{position:fixed;right:10px;top:67px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:6px 0;min-width:220px;max-width:calc(100vw - 20px);box-shadow:var(--sh-md);z-index:9999;opacity:1;visibility:visible;transform:translateY(0) scale(1);transform-origin:top right;transition:opacity .18s ease,transform .18s ease,visibility .18s}
    .p-dropdown.hidden{opacity:0;visibility:hidden;transform:translateY(-8px) scale(.96);pointer-events:none}
    .pd-info{padding:14px 16px 12px;border-bottom:1px solid var(--line)}
    .pd-name{font-weight:700;font-size:.9rem;margin-bottom:2px}
    .pd-email{font-size:.73rem;color:var(--mid)}
    .pd-item{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:.83rem;cursor:pointer;transition:background var(--t-fast);font-weight:500}
    .pd-item:hover{background:var(--faint)}
    .pd-item:active{background:var(--line)}
    .pd-item.danger{color:var(--bad)}

    /* AUTH */
    .auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px 20px;background:var(--bg)}
    .auth-box{background:var(--white);border:1px solid var(--line);border-radius:var(--r-xl);padding:36px;width:100%;max-width:400px}
    .auth-logo{font-family:var(--serif);font-size:1.7rem;margin-bottom:4px;letter-spacing:-.02em}
    .auth-sub{font-size:.78rem;color:var(--mid);margin-bottom:28px;line-height:1.5}
    .auth-tabs{display:flex;margin-bottom:24px;border:1.5px solid var(--line);border-radius:var(--r-sm);overflow:hidden;background:var(--faint);padding:3px;gap:3px}
    .auth-tab{flex:1;padding:8px;text-align:center;font-size:.82rem;font-weight:600;cursor:pointer;background:transparent;color:var(--mid);border:none;border-radius:6px;transition:all var(--t-fast)}
    .auth-tab.active{background:var(--white);color:var(--ink)}
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:.72rem;font-weight:700;color:var(--mid);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
    .form-input{width:100%;padding:10px 13px;font-family:var(--sans);font-size:.88rem;background:var(--white);color:var(--ink);border:1.5px solid var(--line);border-radius:var(--r-sm);outline:none;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
    .form-input:focus{border-color:var(--accent)}
    .form-input::placeholder{color:#c0bfbb}
    .form-input[readonly]{background:var(--faint);cursor:default;color:var(--mid)}
    .form-error{color:var(--bad);font-size:.8rem;margin-top:10px;min-height:1.2em;animation:fadeIn .15s ease}

    /* LAYOUT */
    #app{min-height:100vh;display:flex;flex-direction:column}
    main{flex:1}
    h1{font-family:var(--serif);font-size:1.95rem;font-weight:700;line-height:1.15;letter-spacing:-.03em}
    h2{font-family:var(--serif);font-size:1.35rem;font-weight:600;line-height:1.2;letter-spacing:-.02em}
    h3{font-size:.63rem;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--mid)}
    .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 58px);padding:28px 20px}
    .box{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:32px;width:100%;max-width:400px}
    .page{width:100%;max-width:640px;margin:0 auto;padding:28px 20px}
    .wide{width:100%;max-width:960px;margin:0 auto;padding:24px 20px}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--sans);font-size:.82rem;font-weight:700;padding:8px 16px;border-radius:var(--r-sm);border:1.5px solid transparent;cursor:pointer;transition:all var(--t-fast);white-space:nowrap;letter-spacing:.01em;position:relative;overflow:hidden}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    .btn:not(:disabled):hover{transform:translateY(-1px)}
    .btn:not(:disabled):active{transform:scale(.96) translateY(0)}
    .btn-dark{background:var(--ink);color:#fff}
    
    .btn-white{background:var(--white);color:var(--ink);border-color:var(--line)}
    .btn-white:not(:disabled):hover{background:var(--faint)}
    .btn-ghost{background:transparent;color:var(--mid);border-color:var(--line)}
    .btn-ghost:not(:disabled):hover{background:var(--faint);color:var(--ink)}
    .btn-good{background:var(--good);color:#fff}
    .btn-bad{background:var(--bad);color:#fff}
    .btn-accent{background:var(--accent);color:#fff}
    
    .btn-warn{background:#d97706;color:#fff}
    .btn-sm{padding:5px 12px;font-size:.74rem}
    .btn-lg{padding:12px 26px;font-size:.9rem}
    .btn-full{width:100%}

    /* UTILS */
    .row{display:flex;align-items:center}.col{display:flex;flex-direction:column}
    .gap2{gap:8px}.gap3{gap:12px}.between{justify-content:space-between}
    .mt1{margin-top:6px}.mt2{margin-top:12px}.mt3{margin-top:20px}.mt4{margin-top:32px}
    .mb1{margin-bottom:6px}.mb2{margin-bottom:12px}.mb3{margin-bottom:20px}
    .muted{color:var(--mid);font-size:.84rem}.small{font-size:.77rem}
    hr{border:none;border-top:1px solid var(--line);margin:16px 0}
    .notice{padding:11px 14px;border-radius:var(--r-sm);font-size:.83rem;line-height:1.45;border-left:3px solid currentColor}
    .n-good{background:var(--good-bg);color:var(--good);border-color:var(--good)}
    .n-bad{background:var(--bad-bg);color:var(--bad);border-color:var(--bad)}
    .n-neutral{background:var(--faint);color:var(--ink);border-color:var(--line)}
    .n-accent{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
    .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700}
    .tag-green{background:var(--good-bg);color:var(--good)}
    .tag-ink{background:#e8e8e6;color:var(--ink)}
    .dot-live{width:7px;height:7px;border-radius:50%;background:#16a34a;animation:blink 1.4s ease-in-out infinite;display:inline-block}
    code{font-size:.75rem;background:var(--faint);padding:1px 5px;border-radius:4px;font-family:monospace;border:1px solid var(--line)}

    /* SCORE BANNER */
    .score-banner{position:sticky;top:58px;z-index:90;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:0 16px;display:flex;align-items:center;gap:6px;height:44px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
    .score-banner::-webkit-scrollbar{display:none}
    .sb-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:.71rem;font-weight:600;background:var(--faint);border:1px solid var(--line);white-space:nowrap;flex-shrink:0;transition:all var(--t-fast)}
    .sb-chip.me{background:#e8f5ee;border-color:#a8ddb9;font-weight:800}
    .sb-pts{color:var(--good);font-weight:800}

    /* HOST SHELL */
    .host-shell{display:grid;grid-template-columns:264px 1fr;min-height:calc(100vh - 58px)}
    .host-sidebar{border-right:1px solid var(--line);background:var(--white);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
    .host-main{padding:24px 28px;overflow-y:auto}
    @media(max-width:700px){.host-shell{grid-template-columns:1fr}.host-sidebar{border-right:none;border-bottom:1px solid var(--line)}}

    /* SIDEBAR SECTIONS */
    .sb-sec{border-bottom:1px solid var(--line)}
    .sb-sec-head{display:flex;align-items:center;justify-content:space-between;padding:10px 2px;cursor:pointer;user-select:none}
    .sb-sec-head:hover h3{color:var(--ink)}
    .sb-sec-head h3{transition:color var(--t-fast);margin:0}
    .sb-chevron{font-size:.7rem;color:var(--mid);transition:transform var(--t-med);display:inline-block}
    .sb-chevron.open{transform:rotate(90deg)}
    .sb-body{overflow:hidden;transition:max-height .28s cubic-bezier(.4,0,.2,1)}
    .sb-body.closed{max-height:0!important}

    /* Q LIST */
    .q-list{display:flex;flex-direction:column;gap:2px;padding-bottom:8px}
    .q-row{display:flex;align-items:flex-start;gap:8px;padding:8px;border-radius:var(--r-sm);cursor:pointer;border:1.5px solid transparent;transition:all var(--t-fast)}
    .q-row:hover{background:var(--faint)}
    .q-row.active{background:var(--faint);border-color:var(--line)}
    .q-row.done{opacity:.35}
    .q-row.live{border-color:#86efac;background:#f0fdf4}
    .q-idx{font-size:.65rem;font-weight:800;color:var(--mid);padding-top:2px;min-width:16px}
    .q-snippet{font-size:.79rem;line-height:1.35;flex:1}
    .q-subj{font-size:.6rem;color:var(--mid);background:var(--faint);border-radius:4px;padding:1px 5px;margin-top:2px;display:inline-block;border:1px solid var(--line);font-weight:700}

    /* JOIN FEED */
    .join-feed{display:flex;flex-direction:column;gap:3px;padding-bottom:8px}
    .join-chip{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--r-sm);background:var(--faint);font-size:.78rem;animation:chipIn .3s var(--t-spring) backwards;border:1px solid var(--line)}
    .j-av{width:22px;height:22px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:.63rem;font-weight:800;flex-shrink:0}

    /* SCORES */
    .score-list{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
    .score-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--white);font-size:.85rem;transition:background var(--t-fast)}
    .score-row:last-child{border-bottom:none}
    .score-row:hover{background:var(--faint)}
    .score-rank{min-width:24px;text-align:center;font-size:.85rem;color:var(--mid)}
    .score-name{flex:1;font-weight:600}
    .score-pts{font-weight:800;font-size:.9rem}
    .score-row.me{background:#e8f5ee}
    .score-row.top{background:var(--surface)}

    /* ANSWER KEY */
    .key-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;min-height:120px}
    .key-card{padding:13px 10px;border:1.5px solid var(--line);border-radius:var(--r-sm);cursor:pointer;text-align:center;transition:all var(--t-fast);overflow:hidden;display:flex;flex-direction:column;justify-content:center;background:var(--white)}
    .key-card:hover{background:var(--faint);border-color:#bbb}
    .key-card.selected{background:var(--ink);color:#fff;border-color:var(--ink)}
    .key-card .kl{font-size:.67rem;font-weight:800;opacity:.6;margin-bottom:3px}
    .key-card .kt{font-size:.81rem;line-height:1.3}

    /* LIVE BARS */
    .bar-row{margin-bottom:11px}
    .bar-meta{display:flex;justify-content:space-between;font-size:.76rem;color:var(--mid);margin-bottom:4px}
    .bar-track{height:8px;background:var(--line);border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;background:var(--ink);border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);animation:barGrow .6s cubic-bezier(.4,0,.2,1) backwards}
    .bar-fill.correct{background:linear-gradient(90deg,var(--good),#16a34a)}
    .bar-names{font-size:.69rem;color:var(--mid);margin-top:3px;line-height:1.5}

    /* PARTICIPANT OPTIONS */
    .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .opt-card{display:flex;align-items:center;gap:11px;padding:15px 13px;border:1.5px solid var(--line);border-radius:var(--r-lg);cursor:pointer;background:var(--white);transition:all var(--t-fast);font-size:.86rem;position:relative;overflow:hidden}
    .opt-card:not(.locked):hover{border-color:var(--ink);transform:translateY(-2px)}
    .opt-card:not(.locked):active{transform:scale(.98) translateY(0)}
    .opt-card.chosen{border-color:var(--ink);background:#f5f5f3}
    .opt-card.correct{border-color:var(--good);background:var(--good-bg);animation:popIn .3s var(--t-spring)}
    .opt-card.wrong{opacity:.35}
    .opt-card.locked{cursor:default}
    .opt-key{width:30px;height:30px;flex-shrink:0;border-radius:7px;background:var(--faint);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;transition:all var(--t-fast)}
    .opt-card:not(.locked):hover .opt-key{background:var(--ink);color:#fff;border-color:var(--ink)}
    .opt-card.chosen .opt-key{background:var(--ink);color:#fff;border-color:var(--ink)}
    .opt-card.correct .opt-key{background:var(--good);color:#fff;border-color:var(--good)}
    @media(max-width:480px){.opt-grid{grid-template-columns:1fr}}

    /* TIMER */
    .timer-wrap{margin-bottom:14px}
    .timer-bar-track{height:7px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:6px}
    .timer-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .1s linear}
    .timer-bar-fill.urgent{background:var(--bad)}
    .timer-digits{font-size:.8rem;font-weight:800;color:var(--mid);text-align:right;letter-spacing:.02em}
    .timer-digits.urgent{color:var(--bad)}

    /* STAT STRIP */
    .stat-strip{display:flex;gap:20px;padding:10px 0;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
    .stat-item .stat-val{font-weight:800;font-size:1.05rem}
    .stat-item .stat-lbl{font-size:.65rem;color:var(--mid);text-transform:uppercase;letter-spacing:.08em}

    /* WAITING */
    .wait-shell{display:flex;flex-direction:column;align-items:center;min-height:calc(100vh - 58px);padding:36px 20px}
    .wait-header{text-align:center;margin-bottom:24px}
    .spinner{width:36px;height:36px;border:2.5px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:spin .8s cubic-bezier(.4,0,.2,1) infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:7px;width:100%;max-width:480px}
    .student-chip{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--white);border:1.5px solid var(--line);border-radius:var(--r-sm);font-size:.82rem;transition:border-color var(--t-fast)}
    .student-chip:hover{border-color:#bbb}
    .s-av{width:26px;height:26px;border-radius:50%;background:var(--faint);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0}

    /* VOICE */
    .voice-bar{display:flex;align-items:center;gap:10px;padding:8px 13px;background:var(--faint);border-radius:var(--r-sm);font-size:.8rem;margin-bottom:12px;border:1.5px solid var(--line)}
    .btn svg,.host-ctrl-bar svg,.host-live-nav svg{pointer-events:none}
    .mic-dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0;transition:all var(--t-med)}
    .mic-dot.live{background:#16a34a;animation:blink 1s infinite}
    .mic-dot.err{background:var(--bad)}

    /* RESOURCE BROWSER */
    .subject-list{display:flex;flex-direction:column;gap:8px;margin:14px 0}
    .subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
    .subject-box{border:1.5px solid var(--line);border-radius:var(--r-sm);padding:10px 11px 9px;cursor:pointer;transition:all var(--t-fast);background:var(--white);user-select:none;-webkit-user-select:none}
    .subject-box:hover{border-color:#bbb}
    .subject-box.selected{border-color:var(--ink);background:var(--faint)}
    .subject-box-name{font-size:.82rem;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .subject-box-count{display:flex;align-items:center;gap:5px;font-size:.74rem;color:var(--mid)}
    .subject-count{font-size:.74rem;color:var(--mid)}
    .q-count-input{width:60px;padding:5px 8px;font-size:.83rem;border:1.5px solid var(--line);border-radius:var(--r-sm);text-align:center;outline:none;transition:border-color var(--t-fast)}
    .q-count-input:focus{border-color:var(--accent)}
    .timer-input-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 12px;background:var(--faint);border-radius:var(--r-sm);border:1.5px solid var(--line)}

    /* INSPECT TABLE */
    .itbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r-sm)}
    .itbl{border-collapse:collapse;width:100%;font-size:.79rem}
    .itbl th{padding:9px 12px;text-align:left;border-bottom:1px solid var(--line);background:var(--faint);font-size:.64rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);white-space:nowrap}
    .itbl td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
    .itbl tr:last-child td{border-bottom:none}
    .itbl tbody tr:hover td{background:var(--faint);cursor:pointer}
    .c-ok{color:var(--good);font-weight:800}.c-bad{color:var(--bad)}.c-nil{color:#ccc}
    .detail-wrap{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-top:14px}
    .detail-head{padding:11px 14px;border-bottom:1px solid var(--line);background:var(--faint);display:flex;align-items:center;justify-content:space-between}
    .detail-row{padding:10px 14px;border-bottom:1px solid var(--line);font-size:.83rem}
    .detail-row:last-child{border-bottom:none}
    .detail-q{color:var(--mid);font-size:.74rem;margin-bottom:4px}
    .ans-chips{display:flex;gap:5px;flex-wrap:wrap}
    .ans-chip{padding:2px 9px;border-radius:20px;font-size:.73rem;font-weight:700}
    .ac-good{background:var(--good-bg);color:var(--good)}
    .ac-bad{background:var(--bad-bg);color:var(--bad)}
    .ac-none{background:var(--faint);color:var(--mid)}

    /* LEADERBOARD PANEL */
    .lb-panel{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;width:100%;max-width:480px;margin-top:20px}
    .lb-head{padding:13px 16px;border-bottom:1px solid var(--line);background:var(--faint);display:flex;align-items:center;justify-content:space-between}
    .lb-row{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--line);font-size:.85rem;transition:background var(--t-fast)}
    .lb-row:last-child{border-bottom:none}
    .lb-row:hover{background:var(--faint)}
    .lb-row.me{background:#e8f5ee}

    /* Standings overlay */
    .standings-overlay{position:fixed;inset:0;z-index:900;display:flex;flex-direction:column;background:var(--white);animation:fadeIn .15s ease}
    .standings-overlay-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);background:var(--white);flex-shrink:0}
    .standings-overlay-body{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
    .standings-tbl{width:100%;border-collapse:collapse;font-size:.82rem}
    .standings-tbl th{padding:8px 10px;text-align:center;background:var(--faint);border-bottom:2px solid var(--line);border-right:1px solid var(--line);font-size:.64rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--mid);white-space:nowrap;position:sticky;top:0;z-index:2}
    .standings-tbl th:first-child{text-align:left;position:sticky;left:0;z-index:3;background:var(--faint)}
    .standings-tbl td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:middle;white-space:nowrap}
    .standings-tbl td:first-child{text-align:left;font-weight:700;position:sticky;left:0;background:var(--white);z-index:1}
    .standings-tbl tr:last-child td{border-bottom:none}
    .standings-tbl td.total-col{font-weight:800;background:#f0faf4;border-left:2px solid #b7dfc7;color:#166534}
    .standings-tbl th.total-col{background:#e8f5ee;border-left:2px solid #b7dfc7;color:#166534}
    .standings-tbl .zero{color:var(--line)}
    .lb-sessions{font-size:.72rem;color:var(--mid);margin-right:6px}

    /* NAV RESPONSIVE */
    @media(max-width:480px){
      nav{padding:0 12px;gap:6px}
      .brand small{display:none}
      #conn-lbl{display:none}
      .profile-btn>span:last-child{display:none}
    }

    /* SCHEDULE CARDS */
    .sched-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:border-color var(--t-fast)}
    .sched-card:hover{border-color:#c8c7c0}
    .sched-date-blk{background:var(--ink);color:#fff;border-radius:8px;padding:7px 11px;text-align:center;min-width:46px;flex-shrink:0}
    .sched-day{font-size:1.2rem;font-weight:800;line-height:1}
    .sched-mon{font-size:.56rem;text-transform:uppercase;letter-spacing:.06em;opacity:.75}
    .sched-info{flex:1;min-width:0}
    .sched-title{font-weight:700;font-size:.88rem;margin-bottom:1px}
    .sched-meta{font-size:.74rem;color:var(--mid)}
    .sched-cd{font-size:.71rem;color:var(--accent);font-weight:700;margin-top:2px}
    .sched-del{font-size:.75rem;color:var(--bad);cursor:pointer;padding:4px 8px;border-radius:6px;flex-shrink:0;transition:background var(--t-fast)}
    .sched-del:hover{background:var(--bad-bg)}

    /* PROFILE PAGE */
    .profile-page{max-width:620px;margin:0 auto;padding:24px 20px}
    .profile-hero{display:flex;align-items:center;gap:16px;margin-bottom:22px;padding:20px 22px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-xl)}
    .ph-avatar{width:60px;height:60px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;flex-shrink:0}
    .ph-info{min-width:0}
    .ph-name{font-size:1.08rem;font-weight:800;line-height:1.3;letter-spacing:-.01em}
    .ph-email{font-size:.75rem;color:var(--mid)}
    .ph-summary{font-size:.75rem;color:var(--mid);margin-top:4px}
    .ptabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:20px;overflow-x:auto}
    .ptab{padding:10px 16px;font-size:.82rem;font-weight:600;color:var(--mid);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all var(--t-fast)}
    .ptab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:700}
    .ptab:hover:not(.active){color:var(--ink)}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .stat-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 13px;text-align:center;transition:border-color var(--t-fast)}
    
    .stat-num{font-size:1.55rem;font-weight:800;line-height:1;margin-bottom:3px;font-family:var(--serif)}
    .stat-lbl{font-size:.69rem;color:var(--mid);text-transform:uppercase;letter-spacing:.06em}
    .stat-sub{font-size:.7rem;color:var(--mid);margin-top:1px}
    .pcard{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;margin-bottom:10px}
    .pcard-head{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--mid);margin-bottom:10px}
    .prow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--faint);font-size:.83rem}
    .prow:last-child{border:none}
    .prow-val{font-weight:700}
    .hist-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:7px;font-size:.81rem;transition:border-color var(--t-fast)}
    .hist-row:hover{border-color:#c8c7c0}
    .hist-date{color:var(--mid);font-size:.73rem;min-width:66px}
    .hist-score{font-weight:800;font-size:.92rem}
    .hist-rank{color:var(--mid);flex:1}
    .hist-acc{font-size:.73rem;padding:2px 8px;border-radius:11px;font-weight:700;flex-shrink:0}
    .hist-acc.good{background:var(--good-bg);color:var(--good)}
    .hist-acc.ok{background:#fef9c3;color:#854d0e}
    .hist-acc.bad{background:var(--bad-bg);color:var(--bad)}
    .psec{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;margin-bottom:12px}
    .psec h3{font-size:.84rem;font-weight:700;margin-bottom:12px}
    .form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    .form-row label{font-size:.75rem;font-weight:700;color:var(--mid)}
    .form-msg{font-size:.77rem;margin-top:5px;min-height:16px;animation:fadeIn .15s ease}
    .form-msg.ok{color:var(--good)}.form-msg.err{color:var(--bad)}

    /* PROFILE CHARTS */
    .pov-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
    @media(max-width:520px){.pov-stats{grid-template-columns:repeat(2,1fr)}}
    .pov-stat{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 10px;text-align:center}
    
    .pov-stat-num{font-size:1.45rem;font-weight:800;line-height:1;margin-bottom:2px;font-family:var(--serif)}
    .pov-stat-lbl{font-size:.62rem;color:var(--mid);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
    .pov-stat-sub{font-size:.66rem;color:var(--mid);margin-top:2px}
    .pchart-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;position:relative}
    .pchart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
    .pchart-title{font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--mid)}
    .pchart-legend{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .pchart-leg-item{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--mid)}
    .pchart-leg-dash{width:18px;height:2px;flex-shrink:0}
    .chart-wrap{position:relative;width:100%;overflow:visible}
    .chart-tooltip{position:absolute;top:-36px;background:var(--ink);color:#fff;font-size:.71rem;font-weight:600;padding:5px 10px;border-radius:7px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .13s;transform:translateX(-50%);z-index:20}
    .chart-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--ink)}
    .heatmap-grid{display:grid;grid-template-columns:repeat(15,1fr);gap:3px;margin-top:6px}
    @media(max-width:420px){.heatmap-grid{gap:2px}}
    .hm-col{display:flex;flex-direction:column;gap:3px}
    @media(max-width:420px){.hm-col{gap:2px}}
    .hm-cell{border-radius:3px;aspect-ratio:1;min-height:0;background:var(--faint);transition:transform var(--t-fast)}
    .hm-cell:hover{transform:scale(1.3);z-index:1;position:relative}
    .hm-cell[data-v="0"]{background:#ebe9e3}
    .hm-cell[data-v="1"]{background:#b7dfc7}
    .hm-cell[data-v="2"]{background:#74c69d}
    .hm-cell[data-v="3"]{background:#40916c}
    .hm-cell[data-v="4"]{background:#1b4332}
    .hm-legend{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:6px;font-size:.66rem;color:var(--mid)}
    .hm-swatch{width:11px;height:11px;border-radius:3px;flex-shrink:0}
    .hist-pb-badge{display:inline-flex;align-items:center;gap:3px;background:var(--good-bg);color:var(--good);font-size:.62rem;font-weight:800;padding:1px 6px;border-radius:9px;margin-left:5px;vertical-align:middle}
    .prank-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
    .prank-num{font-family:var(--serif);font-size:2rem;font-weight:700;line-height:1;flex-shrink:0;min-width:50px;text-align:center}
    .prank-info{flex:1;min-width:0}
    .prank-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--mid);margin-bottom:3px}
    .prank-sub{font-size:.78rem;color:var(--mid)}
    .no-data-notice{text-align:center;padding:36px 16px;color:var(--mid);font-size:.83rem}
    .no-data-notice span{font-size:1.8rem;display:block;margin-bottom:10px}

    /* SESSION CONTROL BOX */
    .session-ctrl{padding:13px 15px;border-radius:var(--r-sm);margin-bottom:14px;display:flex;flex-direction:column;gap:8px}
    .session-ctrl-open{background:var(--good-bg);border:1px solid #b7dfc7}
    .session-ctrl-closed{background:var(--faint);border:1px solid var(--line)}
    .session-ctrl-status{display:flex;align-items:center;gap:8px;font-size:.85rem;margin-bottom:2px}
    .session-ctrl-btns{display:flex;gap:7px;flex-wrap:wrap}
    .session-ctrl-btns .btn{flex:1;min-width:80px}

    /* RESULTS MOBILE */
    .results-header{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .results-header h2{flex:1;min-width:120px}
    .results-btns{display:flex;gap:6px;flex-wrap:wrap;width:100%}
    .results-btns .btn{flex:1;min-width:90px;font-size:.75rem;padding:8px 10px}
    .itbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:var(--r-sm)}

    /* SESSION OPEN BANNER */
    .session-open-banner{padding:10px 16px;background:var(--good-bg);border:1px solid #b7dfc7;border-radius:var(--r-sm);margin-bottom:14px;display:flex;align-items:center;gap:10px}
    .session-closed-banner{padding:10px 16px;background:var(--faint);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:14px;display:flex;align-items:center;gap:10px}

    /* HOME TABS */
    .home-tabs{display:flex;border:1.5px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-bottom:20px;background:var(--faint);padding:3px;gap:3px}
    .home-tab{flex:1;padding:9px;text-align:center;font-size:.83rem;font-weight:600;cursor:pointer;background:transparent;color:var(--mid);border:none;border-radius:7px;transition:all var(--t-fast)}
    .home-tab.active{background:var(--white);color:var(--ink)}

    /* ALL-TIME LEADERBOARD PAGE */
    .lb-full{width:100%;max-width:520px;margin:0 auto;padding:28px 20px}
    @media(max-width:480px){.stat-grid{grid-template-columns:repeat(2,1fr)}}

    /* FOLDER GRID */
    .folder-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:8px}
    @media(max-width:320px){.folder-grid{grid-template-columns:repeat(3,1fr)}}
    .folder-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;aspect-ratio:1/1;border:1.5px solid var(--line);border-radius:var(--r-sm);background:var(--white);cursor:pointer;padding:8px 4px;transition:all var(--t-spring);user-select:none;position:relative}
    .folder-card:hover{border-color:#aaa;background:var(--faint);transform:translateY(-2px)}
    .folder-card:active{transform:scale(.95)}
    .folder-card.has-sel{border-color:var(--accent);background:var(--accent-bg)}
    .folder-card .fc-icon{font-size:1.3rem;line-height:1}
    .folder-card .fc-name{font-size:.62rem;font-weight:700;text-align:center;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;color:var(--ink)}
    .folder-card .fc-badge{position:absolute;top:4px;right:5px;background:var(--accent);color:#fff;font-size:.56rem;font-weight:800;padding:1px 5px;border-radius:9px;line-height:1.6}
    .folder-card-add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;aspect-ratio:1/1;border:2px dashed var(--line);border-radius:var(--r-sm);background:var(--faint);cursor:pointer;padding:6px;transition:all var(--t-fast)}
    .folder-card-add:hover{border-color:#999;background:#eeede9}
    .folder-card-add.active{border-color:var(--accent);background:var(--accent-bg);border-style:solid}

    /* HOME / LB FULLSCREEN */
    .home-full{height:calc(100vh - 58px);display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
    .lb-full-screen{height:calc(100vh - 58px);display:flex;flex-direction:column;overflow:hidden;padding:16px 20px}
    .lb-full-inner{max-width:520px;width:100%;margin:0 auto;display:flex;flex-direction:column;flex:1;overflow:hidden}

    /* OVERLAYS */
    .manage-overlay-backdrop,.chapter-overlay-backdrop{position:fixed;inset:0;z-index:860;background:rgba(10,10,18,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .12s ease}
    .chapter-overlay-backdrop{z-index:850}
    .manage-overlay-panel,.chapter-overlay-panel{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;animation:slideUp .18s cubic-bezier(.34,1.2,.64,1);overflow:hidden;}
    .chapter-overlay-panel{max-height:82vh}
    .manage-overlay-head,.chapter-overlay-head{display:flex;align-items:center;padding:16px 18px 12px;flex-shrink:0;border-bottom:1px solid var(--line);gap:10px}
    .chapter-overlay-title{font-size:.95rem;font-weight:800;flex:1;display:flex;align-items:center;gap:8px}
    .manage-overlay-body{overflow-y:auto;flex:1;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
    .chapter-overlay-body{overflow-y:auto;flex:1;padding:10px 14px;display:flex;flex-direction:column;gap:5px}
    .mfile-row{display:flex;align-items:center;gap:7px;padding:9px 11px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:var(--white);transition:all var(--t-fast)}
    .mfile-row:hover{background:var(--faint)}
    .mfile-row.editing{border-color:var(--accent);background:var(--accent-bg)}
    .chapter-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1.5px solid var(--line);border-radius:var(--r-sm);cursor:pointer;background:var(--white);transition:all var(--t-fast)}
    .chapter-row:hover{border-color:#bbb}
    .chapter-row.sel{border-color:var(--accent);background:var(--accent-bg)}
    .chapter-row:active{background:var(--faint)}
    .ch-check{width:17px;height:17px;border-radius:5px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t-fast)}
    .chapter-row.sel .ch-check{border-color:var(--accent);background:var(--accent)}
    .ch-name{flex:1;font-size:.82rem;line-height:1.3}
    .chapter-row.sel .ch-name{font-weight:700;color:var(--accent)}
    .ch-count{width:44px;font-size:.75rem;padding:3px 5px;border:1.5px solid var(--line);border-radius:5px;text-align:center;outline:none;background:var(--white);transition:border-color var(--t-fast)}
    .ch-count:focus{border-color:var(--accent)}
    .chapter-row.sel .ch-count{border-color:var(--accent)}
    .chapter-overlay-foot{padding:12px 14px 24px;flex-shrink:0;border-top:1px solid var(--line);display:flex;gap:8px}

    /* FOCUS RINGS */
    :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
    .key-card:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:var(--r-sm)}
    [data-subj-expand]:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:var(--r-sm)}
    .opt-card:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

    /* HOST SETTINGS OVERLAY */
    .host-settings-overlay{position:fixed;inset:0;z-index:950;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .12s ease}
    .host-settings-panel{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:500px;padding:22px 22px 34px;max-height:80vh;overflow-y:auto;animation:slideUp .18s cubic-bezier(.34,1.2,.64,1)}
    .kbd{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:22px;padding:0 6px;background:var(--faint);border:1px solid #d1d0cb;border-radius:5px;font-family:monospace;font-size:.7rem;font-weight:700;color:var(--ink);flex-shrink:0}
    .shortcut-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--faint)}
    .shortcut-row:last-child{border-bottom:none}

══════════════════════════════════════ */
let audioCtx=null;
function getAudio(){ return audioCtx||(audioCtx=new(window.AudioContext||window.webkitAudioContext)()); }

const SOUND_BASE='https://raw.githubusercontent.com/raeist-user/quizzap/main/Utility/Sounds/';
function playMp3(name){
  try{ const a=new Audio(SOUND_BASE+name); a.volume=1; a.play().catch(()=>{}); }catch(e){}
}
function playClick(){
  try{
    const a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.frequency.value=900;o.type='sine';
    g.gain.setValueAtTime(.15,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.08);
    o.start();o.stop(a.currentTime+.08);
  }catch(e){}
}
function playCorrect(){
  try{
    const a=getAudio(); const t=a.currentTime;
    [523,659,784,1047].forEach((f,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.frequency.value=f;o.type='sine';
      const s=t+i*.13;
      g.gain.setValueAtTime(0,s);
      g.gain.linearRampToValueAtTime(.25,s+.05);
      g.gain.exponentialRampToValueAtTime(.001,s+.35);
      o.start(s);o.stop(s+.35);
    });
  }catch(e){}
}
function playWrong(){
  try{
    const a=getAudio(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type='sawtooth';o.frequency.value=160;
    g.gain.setValueAtTime(.2,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.5);
    o.start();o.stop(a.currentTime+.5);
  }catch(e){}
}

/* ── Timer tick sound — called each second when ≤ 5s remain ── */
let _lastTickSec = -1;
function playTimerTick(remaining){
  try{
    const sec = Math.ceil(remaining);
    if(sec < 1 || sec === _lastTickSec) return;
    _lastTickSec = sec;
    const a = getAudio();
    const t = a.currentTime;
    const isLast = sec <= 2;
    // Pitch rises as we get closer to 0; last 2 secs are louder/higher
    const freq = isLast ? 1400 : 900 + (5 - sec) * 80;
    const vol  = isLast ? .28 : .16;
    const dur  = isLast ? .07 : .055;
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(.001, t + dur);
    o.start(t); o.stop(t + dur);
  }catch(e){}
}

/* ══════════════════════════════════════
   CONFETTI ENGINE
══════════════════════════════════════ */
(function(){
  const COLORS=['#f87171','#fbbf24','#34d399','#60a5fa','#a78bfa','#f472b6','#fb923c'];
  let particles=[], raf=null, canvas, ctx;

  function init(){
    canvas=document.getElementById('confetti-canvas');
    if(!canvas) return false;
    ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    window.addEventListener('resize',()=>{if(canvas){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}});
    return true;
  }

  function Particle(x,y,power){
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*power*2.4;
    this.vy=-(Math.random()*power*2.2+power*0.8);
    this.r=Math.random()*5+3;
    this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
    this.rot=Math.random()*360;
    this.rotV=(Math.random()-0.5)*8;
    this.shape=Math.random()<0.5?'rect':'circle';
    this.gravity=0.22+Math.random()*0.12;
    this.drag=0.988;
    this.alpha=1;
    this.fadeStart=0;
  }

  Particle.prototype.update=function(elapsed){
    this.vy+=this.gravity;
    this.vx*=this.drag; this.vy*=this.drag;
    this.x+=this.vx; this.y+=this.vy;
    this.rot+=this.rotV;
    if(elapsed>1600) this.alpha=Math.max(0,1-(elapsed-1600)/800);
  };
  Particle.prototype.draw=function(){
    ctx.save();
    ctx.globalAlpha=this.alpha;
    ctx.fillStyle=this.color;
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rot*Math.PI/180);
    if(this.shape==='circle'){ ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill(); }
    else { ctx.fillRect(-this.r,-this.r/2,this.r*2,this.r); }
    ctx.restore();
  };

  function loop(start){
    const elapsed=performance.now()-start;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{ p.update(elapsed); p.draw(); });
    particles=particles.filter(p=>p.alpha>0.01&&p.y<canvas.height+40);
    if(particles.length) raf=requestAnimationFrame(()=>loop(start));
    else{ ctx.clearRect(0,0,canvas.width,canvas.height); raf=null; }
  }

  window.launchConfetti=function(opts={}){
    if(!canvas&&!init()) return;
    if(raf){ cancelAnimationFrame(raf); raf=null; }
    const cx=opts.x??canvas.width/2, cy=opts.y??canvas.height*0.38;
    const count=opts.count??120, power=opts.power??9;
    for(let i=0;i<count;i++) particles.push(new Particle(cx+(Math.random()-0.5)*40,cy,power));
    raf=requestAnimationFrame(()=>loop(performance.now()));
  };

  window.launchConfettiSmall=function(x,y){
    if(!canvas&&!init()) return;
    const count=28, power=5;
    for(let i=0;i<count;i++) particles.push(new Particle(x,y,power));
    if(!raf) raf=requestAnimationFrame(()=>loop(performance.now()));
  };
})();

function loadStoredAuth(){
  try{
    const t=localStorage.getItem('scc_token');
    const u=localStorage.getItem('scc_user');
    if(t&&u){ authToken=t; currentUser=JSON.parse(u); }
  }catch(e){}
}
function saveAuth(token,user){ authToken=token; currentUser=user; localStorage.setItem('scc_token',token); localStorage.setItem('scc_user',JSON.stringify(user)); }
function clearAuth(){ authToken=null; currentUser=null; localStorage.removeItem('scc_token'); localStorage.removeItem('scc_user'); invalidateSessionCache(); }

/* ── Server-side session sync ───────────────────────────────────────────────
   Called once on boot: verifies the stored token against the DB.
   - If the account was deleted  → clears auth and shows login screen
   - If the account data changed (e.g. username was manually added) → refreshes local session
   This ensures deleted accounts never persist in localStorage.
──────────────────────────────────────────────────────────────────────────── */
async function syncAuthWithServer(){
  if(!authToken) return; // not logged in — nothing to sync
  try{
    const r=await fetch('/api/me',{headers:{Authorization:'Bearer '+authToken}});
    if(r.status===401||r.status===403){
      // Account deleted or token invalid — force logout
      clearAuth();
      // Also clear nav state so we don't restore a stale screen
      try{ sessionStorage.removeItem('scc_nav'); sessionStorage.removeItem('qz_pid'); }catch(_){}
      render();
      return;
    }
    if(!r.ok) return; // server error — fail silently, don't log out on transient errors
    const d=await r.json();
    if(d.token&&d.user){
      // Refresh token + user data in case anything changed (e.g. username updated in DB)
      saveAuth(d.token,d.user);
      currentUser=d.user;
    }
  }catch(e){
    // Network error (offline, server starting up) — don't log out, just continue
    console.warn('Session sync skipped (network):', e.message);
  }
}

/* ── Navigation-state persistence (survives reload) ─────────────────────── */
const NAV_KEY='scc_nav';
function saveNavState(){

    // Only persist states that make sense to restore after reload.
    // We never restore a mid-question live session since WS reconnect handles that.
    const st={
      role: role,
      hostAuthed: hostAuthed,

    };
    sessionStorage.setItem(NAV_KEY, JSON.stringify(st));

}
function loadNavState(){
  try{
    const raw=sessionStorage.getItem(NAV_KEY);
    if(!raw) return;
    const st=JSON.parse(raw);
    role          = st.role          ?? null;

// ── SESSION HISTORY ──────────────────────────────────────────────────────
// History is now stored server-side. We keep a short-lived in-memory cache
// so the profile page doesn't re-fetch on every tab switch.
let _sessionCache = null;       // null = not loaded yet, [] = loaded but empty
let _sessionCacheTime = 0;
const SESSION_CACHE_TTL = 30000; // 30 s

async function loadHistory(){
  if(_sessionCache !== null && (Date.now()-_sessionCacheTime) < SESSION_CACHE_TTL)
    return _sessionCache;
  if(!authToken) return [];
  try{
    const r = await fetch('/api/sessions',{headers:{Authorization:'Bearer '+authToken}});
    const d = await r.json();
    _sessionCache = d.history || [];
    _sessionCacheTime = Date.now();
    return _sessionCache;
  }catch(e){ return _sessionCache || []; }
}
function invalidateSessionCache(){ _sessionCache=null; _sessionCacheTime=0; }

async function saveSession(e){
  // Persist to DB — fire and forget, no UI block
  if(!authToken) return;
  try{
    await fetch('/api/sessions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},
      body:JSON.stringify(e)
    });
    invalidateSessionCache(); // force fresh load next time profile opens
  }catch(err){ console.warn('saveSession failed:',err.message); }
}
function computeStats(){
  const h=loadHistory(); if(!h.length) return null;
  const totalCorrect=h.reduce((s,e)=>s+(e.correct||0),0);
  const totalQs=h.reduce((s,e)=>s+(e.total||0),0);
  const accuracy=totalQs?Math.round(totalCorrect/totalQs*100):0;
  const bestScore=Math.max(...h.map(e=>e.score||0));
  const bestRank=Math.min(...h.map(e=>e.rank||999));
  const today=new Date(); today.setHours(0,0,0,0);
  const dayMs=86400000;
  const days=[...new Set(h.map(e=>{ const d=new Date(e.date); d.setHours(0,0,0,0); return d.getTime(); }))].sort((a,b)=>b-a);
  let streak=0;
  if(days.length&&(today.getTime()-days[0])<=dayMs){
    for(let i=0;i<days.length;i++){ if(Math.abs(days[i]-(today.getTime()-i*dayMs))<=dayMs) streak++; else break; }
  }
  return {sessions:h.length,totalCorrect,totalQs,accuracy,bestScore,bestRank:bestRank===999?null:bestRank,streak};
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
// Three separate fetch calls so each tab loads independently.
// All three use the same endpoint with a ?period= param.
/* ── fetchLeaderboard ────────────────────────────────────────────────────────
   Fetch one or all leaderboard periods from the server.

   period: 'today' | 'week' | 'all' | undefined (= all three)

   Each period is fetched independently so a failure in one tab does not
   affect the others.  Loading state is tracked per-tab via lbFetched so
   the spinner only appears while that tab is genuinely in-flight, and
   cached results are never wiped unnecessarily.
──────────────────────────────────────────────────────────────────────────── */
async function fetchLeaderboard(period){
  const periods = period ? [period] : ['today','week','all'];

  // Map each period to its cache variable getter/setter
  const cache = {
    today: { get:()=>todayLB,   set:(v)=>{ todayLB=v;   }, key:'today' },
    week:  { get:()=>weekLB,    set:(v)=>{ weekLB=v;     }, key:'week'  },
    all:   { get:()=>allTimeLB, set:(v)=>{ allTimeLB=v;  }, key:'all'   },
  };

  // Mark each requested period as loading and clear its error
  periods.forEach(p => {
    cache[p].set(null);      // null = loading sentinel
    lbFetched[p] = false;    // false = in-flight
    lbErrors[p]  = null;
  });

  render(); // show spinners immediately

  // Fire all fetches concurrently
  await Promise.all(periods.map(async (p) => {
    try {
      const r = await fetch('/api/leaderboard?period=' + p);
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || ('Server error (' + r.status + ')'));
      cache[p].set(Array.isArray(d.leaderboard) ? d.leaderboard : []);
      lbErrors[p]  = null;
    } catch(e) {
      console.error('fetchLeaderboard [' + p + ']:', e.message);
      cache[p].set([]);              // empty array so UI shows "no scores"
      lbErrors[p]  = e.message || 'Failed to load';
    } finally {
      lbFetched[p] = true;           // true = settled (success or error)
    }
  }));

  // If viewing profile overview, patch just the rank card without a full re-render
  if(showingProfile && profileTab==='overview'){
    const rc = document.getElementById('profile-rank-card');
    if(rc){ rc.outerHTML = buildRankCardHTML(); return; }
  }

  render();
}

/* ══════════════════════════════════════
   WEBSOCKET
══════════════════════════════════════ */
let ws, myCid=null;
const WS_URL=`${location.protocol==='https:'?'wss':'ws'}://${location.host}`;
let prevStatus=null;

function connect(){
  if(ws&&(ws.readyState===0||ws.readyState===1)) return; // already connecting or open
  if(!location.host) return; // guard against invalid URL (e.g. file:// context)
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{
    setConn(true);
    if(role==='host'&&hostAuthed)          send({type:'set_host',password:HOST_PASSWORD_INPUT||''});
    else if(role==='participant'&&myName)  send({type:'join',name:myName,pid:myPid,userId:currentUser?.id});
  };
  ws.onmessage=async e=>{
    const m=JSON.parse(e.data);
    switch(m.type){
      case 'hello':     myCid=m.cid; break;
      case 'kicked':
        { const fl = m.payload?.finalLeaderboard;
          if(fl && fl.length) haltedSnapshot = fl;
          else { const fp = m.payload?.participants||S.participants||[]; if(fp.length) haltedSnapshot=[...fp]; }
          // totalQuestions comes from server (host's pushed question count) — authoritative
          haltedTotalQuestions = m.payload?.totalQuestions || S.pushedCount || 0;
          haltedTotalLabel = haltedTotalQuestions > 0 ? String(haltedTotalQuestions) : '?';
          // ── Save session to history ──────────────────────────────────────
          if(role==='participant'&&myPid){
            const kickParts=m.payload?.participants||S.participants||[];
            const kickSorted=[...kickParts].sort((a,b)=>(b.score||0)-(a.score||0));
            const kickMe=kickParts.find(p=>p.id===myPid);
            const kickScore=kickMe?.score||S.myScore||0;
            const kickRank=kickSorted.findIndex(p=>p.id===myPid)+1;
            const kickTotal=m.payload?.totalQuestions||S.pushedCount||studentQCount||0;
            const kickHistory=m.payload?.myHistory||S.myHistory||[];
            const kickCorrect=kickHistory.length
              ? kickHistory.filter(h=>h.myAnswer!==null&&h.myAnswer===h.correct).length
              : sessionCorrectTimes.length; // fallback: count of timed correct answers
            const kickFastest=sessionCorrectTimes.length?Math.round(Math.min(...sessionCorrectTimes)*1000):null;
            saveSession({date:new Date().toISOString(),score:kickScore,total:kickTotal,rank:kickRank||0,participants:kickParts.length,correct:kickCorrect,fastestMs:kickFastest});
            sessionCorrectTimes=[];
          }
        }
        showingHalted=false; showingDismissed=true; dismissedCountdown=120;
        if(dismissedTimer){clearInterval(dismissedTimer);dismissedTimer=null;}
        dismissedTimer=setInterval(()=>{
          dismissedCountdown=Math.max(0,dismissedCountdown-1);
          const cd=document.getElementById('dismissed-cd-num');
          if(cd) cd.textContent=`${Math.floor(dismissedCountdown/60)}:${String(dismissedCountdown%60).padStart(2,'0')}`;
          const ring=document.getElementById('dismissed-ring');
          if(ring) ring.style.strokeDashoffset=(125.7*(dismissedCountdown/120)).toFixed(2);
          if(dismissedCountdown<=0){clearInterval(dismissedTimer);dismissedTimer=null;doDismissHome();}
        },1000);
        render(); break;
      case 'halted':
        { const haltedParts=m.payload?.participants||S.participants||[];
          haltedSnapshot=haltedParts;
          haltedTotalQuestions = m.payload?.totalQuestions || S.pushedCount || 0;
          haltedTotalLabel = haltedTotalQuestions > 0 ? String(haltedTotalQuestions) : '?';
        }
        showingHalted=true; haltedCountdown=0; // no auto-dismiss — wait for host
        render();
        break;
      case 'session_resumed':
        // Host chose Continue — return students to the session
        showingHalted=false; haltedSnapshot=[];
        render(); break;
      case 'state': {
        const ns=m.payload.status, inc=m.payload.myScore||0;
        if(ns==='idle'&&prevStatus==='revealed'){ scoreGain=inc-prevMyScore; if(scoreGain<0)scoreGain=0; }
        if(ns==='question'){
          scoreGain=0; prevMyScore=inc;
          // Only reset per-question timing on a BRAND NEW question push (questionPushedAt changes),
          // NOT on every state update for the same question (which would wipe the student's stored time).
          if(m.payload.questionPushedAt !== S.questionPushedAt){
            myLastAnswerTime=null;
            localAnswerTimes={};
            studentQCount++;
            startTimerDisplay._lastStart=null; // force timer restart for new question
          }
          // Clear push-stuck state
          pushing=false;
          if(pushTimeout){ clearTimeout(pushTimeout); pushTimeout=null; }
        }
        // Accumulate per-player answer times from server when question is revealed
        if(ns==='revealed'&&prevStatus==='question'){
          const revTimes=m.payload.answerTimes||{};
          for(const [pid,secs] of Object.entries(revTimes)){
            if(secs!=null) cumulativeAnswerTimes[pid]=(cumulativeAnswerTimes[pid]||0)+parseFloat(secs);
          }
        }
        if(ns==='idle'&&prevStatus==='idle'){ prevMyScore=inc; }
        // Save session on end (natural end — all questions done)
        if(ns==='ended'&&prevStatus!=='ended'&&role==='participant'&&myPid&&!showingDismissed){
          const pts=m.payload.participants||[];
          const sorted2=[...pts].sort((a,b)=>(b.score||0)-(a.score||0));
          const myRank2=sorted2.findIndex(p=>p.id===myPid)+1;
          const hist2=m.payload.myHistory||[];
          const correct2=hist2.filter(h=>h.myAnswer!==null&&h.myAnswer===h.correct).length;
          const fastestMs=sessionCorrectTimes.length?Math.round(Math.min(...sessionCorrectTimes)*1000):null;
          saveSession({date:new Date().toISOString(),score:inc,total:hist2.length,rank:myRank2||0,participants:pts.length,correct:correct2,fastestMs});
          sessionCorrectTimes=[];
        }
        // Detect answer reveal sounds + capture correct answer timing
        if(role==='participant'){
          if(ns==='revealed'&&prevStatus==='question'){
            const myAns=m.payload.myAnswer;
            const correct=m.payload.correct;
            if(myAns!==null&&myAns!==undefined){
              setTimeout(()=>{
                myAns===correct?playCorrect():playWrong();
                // 🎉 Small confetti burst on correct answer
                if(myAns===correct && typeof launchConfettiSmall==='function'){
                  const el=document.querySelector('.opt-card.correct');
                  if(el){ const r=el.getBoundingClientRect(); launchConfettiSmall(r.left+r.width/2, r.top+r.height/2); }
                  else launchConfettiSmall(window.innerWidth/2, window.innerHeight*0.5);
                }
              },200);
              if(myAns===correct&&myLastAnswerTime!==null) sessionCorrectTimes.push(myLastAnswerTime);
            }
          }
        }
        // 🎊 Big confetti on session end if player is in top 3
        if(ns==='ended'&&prevStatus!=='ended'&&role==='participant'&&myPid){
          const endParts=m.payload.participants||[];
          const endSorted=[...endParts].sort((a,b)=>(b.score||0)-(a.score||0));
          const myEndRank=endSorted.findIndex(p=>p.id===myPid)+1;
          if(myEndRank>=1&&myEndRank<=3&&typeof launchConfetti==='function'){
            setTimeout(()=>launchConfetti({count: myEndRank===1?200:140, power: myEndRank===1?12:9}), 400);
          }
        }
        prevStatus=ns; S=m.payload;
        // Exit halted screen when new session state arrives
        if(ns==='idle'&&showingHalted){ showingHalted=false; haltedSnapshot=[]; }
        render(); break;
      }
      case 'joined':    myPid=m.pid; sessionStorage.setItem('qz_pid',m.pid); break;
      case 'auth_ok':   hostAuthed=true; fetchHostSchedules(); browseRepo(); fetchAdminRequests(); navPush(); render(); break;
      case 'auth_fail': { const el=document.getElementById('pw-err'); if(el)el.textContent='Incorrect password.'; break; }
      case 'left':      doLeave(); break;
      case 'hand_raised': {
        if(role==='host') showHandRaiseToast(m.name);
        break;
      }
      case 'report_received': {
        receivedReports = m.reports || [];
        // Update badge in-place without full re-render (avoids flicker during live quiz)
        const rb = document.getElementById('reports-badge');
        if (rb) {
          rb.textContent = receivedReports.length;
          rb.style.display = receivedReports.length ? 'flex' : 'none';
        }
        // If overlay is open, re-render to show updated list
        if (reportsOverlayOpen) render();
        break;
      }
      case 'open_session_result':
        if(m.ok){
          playMp3('start.mp3');
          showToast('✅ Session is open! Students can now join.','good');
        } else {
          showToast('❌ Failed to open session: '+m.reason+'\nTry refreshing the page.','bad');
        }
        break;
      case 'peer_list': for(const cid of m.cids) await hostCallPeer(cid); break;
      case 'rtc_new_peer': if(role==='host') await hostCallPeer(m.cid); break;
      case 'rtc_offer':    if(role==='participant') await studentHandleOffer(m.signal); break;
      case 'rtc_answer':   if(role==='host') await hostHandleAnswer(m.fromCid,m.signal); break;
      case 'rtc_ice':
        if(role==='host'&&peerConns[m.fromCid]) peerConns[m.fromCid].addIceCandidate(new RTCIceCandidate(m.signal)).catch(()=>{});
        if(role==='participant'&&remoteConn)     remoteConn.addIceCandidate(new RTCIceCandidate(m.signal)).catch(()=>{});
        break;
    }
  };
  ws.onclose=()=>{ setConn(false); setTimeout(connect,2000); };
  ws.onerror=()=>ws.close();
}
function send(d){ if(ws?.readyState===1) ws.send(JSON.stringify(d)); }

  let container=document.getElementById('toast-container');
  if(!container){
    container=document.createElement('div');
    container.id='toast-container';
    container.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;max-width:90vw';
    document.body.appendChild(container);
  }
  const t=document.createElement('div');
  const bg=type==='good'?'#166534':type==='bad'?'#be123c':'#1e293b';
  t.style.cssText=`background:${bg};color:#fff;padding:10px 18px;border-radius:8px;font-size:.85rem;font-weight:500;box-shadow:var(--sh-sm);pointer-events:auto;line-height:1.4;white-space:pre-wrap;text-align:center;opacity:0;transition:opacity .2s`;
  t.textContent=msg;
  container.appendChild(t);
  requestAnimationFrame(()=>{ t.style.opacity='1'; });
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),220); },4000);
}

async function startMic(){
  try{
    if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
    localStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true},video:false});
    render(); send({type:'get_peers'});
  }catch(e){ alert('Microphone access denied.'); }
}
function stopMic(){
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  Object.values(peerConns).forEach(pc=>pc.close());
  Object.keys(peerConns).forEach(k=>delete peerConns[k]);
  render();
}
async function hostCallPeer(cid){
  if(!localStream) return;
  if(peerConns[cid]){peerConns[cid].close();delete peerConns[cid];}
  const pc=new RTCPeerConnection(STUN); peerConns[cid]=pc;
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=ev=>{ if(ev.candidate) send({type:'rtc_ice_to_peer',toCid:cid,signal:ev.candidate.toJSON()}); };
  pc.onconnectionstatechange=()=>{ if(['failed','closed','disconnected'].includes(pc.connectionState)){pc.close();delete peerConns[cid];} };
  try{ const offer=await pc.createOffer(); await pc.setLocalDescription(offer); send({type:'rtc_offer',toCid:cid,signal:{type:pc.localDescription.type,sdp:pc.localDescription.sdp}}); }catch(e){}
}
async function hostHandleAnswer(cid,sdp){
  const pc=peerConns[cid]; if(!pc||pc.signalingState==='stable') return;
  try{ await pc.setRemoteDescription(new RTCSessionDescription(sdp)); }catch(e){}
}

async function studentHandleOffer(sdp){
  if(remoteConn){try{remoteConn.close();}catch(e){} remoteConn=null;}
  const pc=new RTCPeerConnection(STUN); remoteConn=pc;
  pc.onicecandidate=ev=>{ if(ev.candidate) send({type:'rtc_ice_to_host',signal:ev.candidate.toJSON()}); };
  pc.ontrack=ev=>{ const a=document.getElementById('remote-audio'); if(a&&a.srcObject!==ev.streams[0]){a.srcObject=ev.streams[0];a.play().catch(()=>{});} updateMicDot(); };
  pc.oniceconnectionstatechange=()=>updateMicDot();

}

/* ══════════════════════════════════════
   TIMER
══════════════════════════════════════ */
function startTimerDisplay(){
  const total=S.timerSeconds, start=S.questionPushedAt;
  if(!total||!start||S.status!=='question'){
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
    return;
  }
  // Don't restart interval if already running for the same question push time
  if(timerInterval && startTimerDisplay._lastStart===start) return;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  startTimerDisplay._lastStart=start;
  _lastTickSec=-1; // reset tick deduplication for each new question
  function tick(){
    const elapsed=Math.max(0,(Date.now()-start)/1000);
    const remaining=Math.max(0, total-elapsed);
    // Cap display value at total so we never show more than the set timer (avoids clock skew showing +1)
    const displaySecs=Math.min(total, Math.ceil(remaining));
    const pct=(remaining/total)*100;
    const urgent=remaining<total*0.25;
    // Student timer bar
    const bar=document.getElementById('timer-bar');
    const dig=document.getElementById('timer-digits');
    if(bar&&dig){
      bar.style.width=pct+'%';
      bar.className='timer-bar-fill'+(urgent?' urgent':'');
      dig.textContent=displaySecs+'s';
      dig.className='timer-digits'+(urgent?' urgent':'');
    }
    // Host timer bar (in host controller)
    const hBar=document.getElementById('host-timer-bar');
    const hDig=document.getElementById('host-timer-digits');
    if(hBar&&hDig){
      hBar.style.width=pct+'%';
      hBar.style.background=urgent?'var(--bad)':'var(--accent)';
      hDig.textContent=displaySecs+'s';
      hDig.style.color=urgent?'var(--bad)':'var(--ink)';
    }
    // 🔔 Timer tick sound: beep each second for last 5 seconds
    if(remaining>0 && remaining<=5) playTimerTick(remaining);
    if(remaining<=0){
      clearInterval(timerInterval);timerInterval=null;
      document.querySelectorAll('.opt-card').forEach(c=>c.classList.add('locked'));
    }
  }
  tick(); timerInterval=setInterval(tick,100);
}

/* ══════════════════════════════════════
   PARSER
══════════════════════════════════════ */
function urduCls(q){ return q?.subject?.toLowerCase()==='urdu'?' urdu':''; }

function parseQuestions(text){
  const out=[],lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  for(let i=0;i<lines.length;i++){
    const qLine=lines[i],oLine=lines[i+1]||'';
    const m=oLine.match(/\(A\)([^,(]+)[,，]\s*\(B\)([^,(]+)[,，]\s*\(C\)([^,(]+)[,，]\s*\(D\)([^,(]+)/i);
    if(m){
      // Detect @ marker in any option to pre-select the correct answer
      const rawOpts=[m[1],m[2],m[3],m[4]];
      let preCorrect=-1;
      const cleanOpts=rawOpts.map((o,idx)=>{
        if(o.includes('@')){ preCorrect=idx; return o.replace(/@/g,'').trim(); }
        return o.trim();
      });
      const entry={text:qLine.replace(/^\d+[.)]\s*/,'').trim(),options:cleanOpts};
      if(preCorrect>=0) entry.correct=preCorrect;
      out.push(entry);
      i++;
    }
  }
  return out;
}

function isValidToken() { 
  return MY_TOKEN && !MY_TOKEN.startsWith('%%') && MY_TOKEN.length > 0;
}
// GET requests must NOT include Content-Type — triggers CORS preflight that GitHub rejects
function ghReadHeaders(){
  const h={'Accept':'application/vnd.github+json'};
  if(isValidToken()) h['Authorization']='Bearer '+MY_TOKEN;
  return h;
}
// PUT/POST/DELETE can and should include Content-Type
function ghWriteHeaders(){
  const h={'Accept':'application/vnd.github+json','Content-Type':'application/json'};
  if(isValidToken()) h['Authorization']='Bearer '+MY_TOKEN;
  return h;
}
function ghHeaders(){ return ghReadHeaders(); } // legacy alias


async function browseRepo(){

// Load all .txt files inside a subject folder (called when subject is expanded)
async function loadSubjectFiles(subjName){
  const subj=subjects.find(s=>s.name===subjName);
  if(!subj||subj.filesLoaded) return;
  try{
    const encodedPath=subj.path.split('/').map(encodeURIComponent).join('/');
    const res=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}`,{headers:ghHeaders()});
    if(!res.ok) throw new Error(`GitHub API ${res.status}`);
    const items=await res.json();
    subj.files=items
      .filter(i=>i.type==='file'&&i.name.endsWith('.txt')&&i.name!=='.gitkeep')
      .map(i=>({name:i.name,path:i.path,sha:i.sha,selected:false,count:0}));
    subj.filesLoaded=true;
    // If folder overlay is open for this subject, seed draft with newly loaded files
    if(folderOverlaySubject===subjName){
      subj.files.forEach(f=>{ if(!folderOverlayDraft[f.name]) folderOverlayDraft[f.name]={selected:f.selected,count:f.count||0}; });
      // Patch only the overlay body to avoid full-page re-render flicker
      const body=document.querySelector('.chapter-overlay-body');
      if(body){
        body.innerHTML=subj.files.length
          ?subj.files.map(f=>{
              const d=folderOverlayDraft[f.name]||{selected:false,count:0};
              return `<div class="chapter-row${d.selected?' sel':''}" data-ch-toggle="${esc(f.name)}">
                <div class="ch-check">${d.selected?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>':''}</div>
                <span class="ch-name">${esc(f.name.replace(/\.txt$/i,''))}</span>
                ${d.selected?`<input class="ch-count" type="number" min="0" max="999" value="${d.count||''}" placeholder="all" data-ch-cnt="${esc(f.name)}" title="0 or blank = all questions" onclick="event.stopPropagation()"/>`:'<span style="width:44px"></span>'}
              </div>`;
            }).join('')
          :'<p class="muted" style="padding:20px;text-align:center;font-size:.84rem">No .txt files in this folder.</p>';
        // Re-attach event listeners for the newly injected rows
        body.querySelectorAll('[data-ch-toggle]').forEach(el=>{
          el.addEventListener('click',e=>{
            if(e.target.tagName==='INPUT') return;
            const fn=el.dataset.chToggle;
            if(!folderOverlayDraft[fn]) folderOverlayDraft[fn]={selected:false,count:0};
            const nowSel=!folderOverlayDraft[fn].selected;
            folderOverlayDraft[fn].selected=nowSel;
            el.classList.toggle('sel',nowSel);
            const chk=el.querySelector('.ch-check');
            if(chk) chk.innerHTML=nowSel?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>':'';
            const existingInput=el.querySelector('.ch-count');
            const existingSpacer=el.querySelector('span[style*="width:44px"]');
            if(nowSel&&!existingInput){
              if(existingSpacer) existingSpacer.remove();
              const inp=document.createElement('input');
              inp.className='ch-count'; inp.type='number'; inp.min='0'; inp.max='999';
              inp.value=folderOverlayDraft[fn].count||''; inp.placeholder='all';
              inp.dataset.chCnt=fn; inp.title='0 or blank = all questions';
              inp.onclick=ev=>ev.stopPropagation();
              inp.addEventListener('change',()=>{ folderOverlayDraft[fn].count=Math.max(0,parseInt(inp.value)||0); });
              el.appendChild(inp);
            } else if(!nowSel&&existingInput){
              existingInput.remove();
              const sp=document.createElement('span'); sp.style.width='44px'; el.appendChild(sp);
            }
          });
        });
      }
    }
    render();
  }catch(e){ console.warn('Could not load files for',subjName,e.message); subj.filesLoaded=true; render(); }
}

      if(chk.ok){ const d=await chk.json(); sha=d.sha; }

    manageFile=fileName;
    setUploadMsg('Saved successfully!','good');
    await loadFolderFiles(manageFolder);
  }catch(e){setUploadMsg(e.message,'bad');}

async function generateQuiz(){
  const msg=document.getElementById('gen-msg'); if(!msg)return;
  const selections=[];
  subjects.forEach(s=>{
    s.files.filter(f=>f.selected).forEach(f=>selections.push({file:f,subjName:s.name}));
  });
  if(!selections.length){msg.innerHTML='<div class="notice n-bad mt2">Select at least one chapter file above.</div>';return;}
  // Denominator is now based on questions actually pushed, not questions loaded
  msg.innerHTML='<div class="notice n-neutral mt2">Fetching questions…</div>';
  let all=[];
  try{
    for(const {file,subjName} of selections){
      // Use GitHub contents API (not raw.githubusercontent.com) — avoids CORS preflight rejection
      const encodedPath=file.path.split('/').map(encodeURIComponent).join('/');
      const apiUrl=`https://api.github.com/repos/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}`;
      const res=await fetch(apiUrl,{headers:ghHeaders()});
      if(!res.ok) throw new Error(`Could not fetch ${file.name} (HTTP ${res.status})`);
      const data=await res.json();
      // Decode base64 content (handles UTF-8 / Hindi / Urdu etc.)
      const bytes=Uint8Array.from(atob(data.content.replace(/\n/g,'')),c=>c.charCodeAt(0));
      const text=new TextDecoder('utf-8').decode(bytes);
      const parsed=parseQuestions(text);
      if(!parsed.length) throw new Error(`No valid questions found in ${file.name}`);
      const take=(file.count>0)?Math.min(file.count,parsed.length):parsed.length;
      const ordered=hostRandomize?[...parsed].sort(()=>Math.random()-.5):parsed;
      const picked=ordered.slice(0,take);
      picked.forEach(q=>{ q.subject=subjName; q.chapter=file.name.replace(/\.txt$/i,''); });
      all=[...all,...picked];
    }
    questions=all; selIdx=0; answerKey=all[0]?.correct??-1;
    msg.innerHTML=''; render();
  }catch(e){ msg.innerHTML=`<div class="notice n-bad mt2">${esc(e.message)}</div>`; }
}

/* ══════════════════════════════════════
   SORT HELPERS
══════════════════════════════════════ */
// Primary: pts descending. Tiebreaker: cumulative answer time ascending (less time = higher rank).
// Players who never answered have Infinity time (go to bottom within same pts band).
function sortParticipants(parts){
  return [...parts].sort((a,b)=>{
    const sd=(b.score||0)-(a.score||0);
    if(sd!==0) return sd;
    const ta=cumulativeAnswerTimes[a.id]??Infinity;
    const tb=cumulativeAnswerTimes[b.id]??Infinity;
    return ta-tb;
  });
}

function scoreBannerHTML(){
  if(!myPid||(S.status!=='question'&&S.status!=='revealed')) return '';
  const sorted=sortParticipants(S.participants||[]);
  if(!sorted.length) return '';
  const medals=['🥇','🥈','🥉'];
  const myRank=sorted.findIndex(p=>p.id===myPid)+1;
  const myP=sorted.find(p=>p.id===myPid);
  let chips=sorted.slice(0,5).map((p,i)=>`<div class="sb-chip${p.id===myPid?' me':''}"><span>${medals[i]||'#'+(i+1)}</span><span>${esc(p.name.length>12?p.name.slice(0,11)+'…':p.name)}</span><span class="sb-pts">${p.score||0}</span></div>`).join('');
  if(myRank>5&&myP) chips+=`<span style="color:var(--line);font-size:.8rem">···</span><div class="sb-chip me"><span>#${myRank}</span><span>${esc(myP.name.slice(0,11))}</span><span class="sb-pts">${myP.score||0}</span></div>`;
  return `<div class="score-banner">${chips}</div>`;
}
